<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>مؤسسة الصداقة للتجارة العامة — نظام الإدارة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F1F7FB; --surface:#FFFFFF; --ink:#16242E; --muted:#5B6B76;
  --line:#E2EAF0; --line-2:#EEF3F7;
  --primary:#1D4ED8; --primary-d:#1E40AF; --primary-soft:#E5EDFF;
  --cyan:#06B6D4; --cyan-d:#0891B2; --cyan-soft:#CFFAFE; --navy:#1E3A8A;
  --gold:#B7791F; --gold-soft:#FBF1DE;
  --success:#15803D; --success-soft:#E7F4EC;
  --warn:#C2710C; --warn-soft:#FBEDDD;
  --danger:#DC2626; --danger-soft:#FBE9E9;
  --shadow:0 1px 2px rgba(16,36,31,.04),0 6px 24px rgba(16,36,31,.06);
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Tajawal',system-ui,'Segoe UI',Tahoma,sans-serif;
  background:var(--bg); color:var(--ink); font-size:15px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:inherit}
.hidden{display:none!important}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{
  width:248px;background:var(--surface);border-inline-start:1px solid var(--line);
  position:fixed;inset-block:0;inset-inline-end:0;display:flex;flex-direction:column;
  padding:18px 14px;z-index:40;overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:11px;padding:6px 8px 16px}
.brand .logo{
  width:42px;height:42px;border-radius:50%;flex:0 0 auto;background:#fff;
  background-size:contain;background-position:center;background-repeat:no-repeat;
  display:grid;place-items:center;font-weight:800;font-size:18px;color:var(--primary-d);
  border:1px solid var(--line);box-shadow:0 4px 12px rgba(29,78,216,.20);
}
.brand b{font-size:15.5px;font-weight:800;display:block;line-height:1.25}
.brand span{font-size:11.5px;color:var(--muted)}
.nav{display:flex;flex-direction:column;gap:3px;margin-top:6px}
.nav button{
  display:flex;align-items:center;gap:11px;width:100%;text-align:start;
  padding:10px 12px;border:0;background:transparent;border-radius:10px;
  color:var(--muted);font-weight:500;font-size:14.5px;transition:.12s;
}
.nav button .ico{width:20px;height:20px;flex:0 0 auto}
.nav button:hover{background:var(--line-2);color:var(--ink)}
.nav button.active{background:var(--primary-soft);color:var(--primary-d);font-weight:700}
.nav .sep{height:1px;background:var(--line);margin:8px 6px}
.sidebar-foot{margin-top:auto;padding-top:12px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted);text-align:center}

.main{flex:1;margin-inline-end:248px;min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:30;background:rgba(241,247,251,.85);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);padding:13px 22px;display:flex;align-items:center;gap:14px;
}
.topbar h1{font-size:19px;font-weight:800}
.topbar .sub{font-size:12.5px;color:var(--muted);margin-top:1px}
.topbar .spacer{flex:1}
.role-badge{font-size:12px;background:var(--primary-soft);color:var(--primary-d);padding:5px 11px;border-radius:20px;font-weight:700}
.content{padding:22px;max-width:1180px;width:100%}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);
  background:var(--surface);color:var(--ink);padding:9px 15px;border-radius:10px;
  font-weight:700;font-size:14px;transition:.12s;white-space:nowrap;
}
.btn:hover{border-color:#cfd9d5;background:#fafcfb}
.btn .ico{width:17px;height:17px}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-d);border-color:var(--primary-d)}
.btn-danger{background:var(--danger-soft);border-color:transparent;color:var(--danger)}
.btn-danger:hover{background:#f7dcdc}
.btn-ghost{border-color:transparent;background:transparent;color:var(--muted);padding:8px 10px}
.btn-ghost:hover{background:var(--line-2);color:var(--ink)}
.btn-sm{padding:6px 11px;font-size:13px;border-radius:9px}
.btn-icon{padding:7px;border-radius:9px}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(184px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 17px;box-shadow:var(--shadow)}
.stat{display:flex;flex-direction:column;gap:9px}
.stat .top{display:flex;align-items:center;justify-content:space-between}
.stat .label{font-size:13px;color:var(--muted);font-weight:500}
.stat .pill{width:34px;height:34px;border-radius:10px;display:grid;place-items:center}
.stat .pill svg{width:18px;height:18px}
.stat .val{font-size:25px;font-weight:800;letter-spacing:-.5px}
.stat .val small{font-size:13px;font-weight:600;color:var(--muted)}

.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-h{display:flex;align-items:center;gap:12px;padding:14px 17px;border-bottom:1px solid var(--line-2)}
.panel-h h3{font-size:15.5px;font-weight:800}
.panel-h .spacer{flex:1}
.panel-b{padding:6px 0}

/* Table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:start;font-weight:700;color:var(--muted);font-size:12.5px;padding:11px 16px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--line-2);vertical-align:middle}
tr:last-child td{border-bottom:0}
tbody tr:hover{background:#fafcfb}
.t-num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.code-tag{font-family:ui-monospace,monospace;font-size:12.5px;background:var(--line-2);padding:2px 7px;border-radius:6px;color:var(--muted)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px}
.b-ok{background:var(--success-soft);color:var(--success)}
.b-low{background:var(--warn-soft);color:var(--warn)}
.b-out{background:var(--danger-soft);color:var(--danger)}
.b-gray{background:var(--line-2);color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%}

/* Inputs */
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;font-weight:700;color:var(--ink)}
.inp,select.inp,textarea.inp{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
  background:var(--surface);color:var(--ink);transition:.12s;
}
.inp:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
textarea.inp{resize:vertical;min-height:64px}
.search{position:relative;flex:1;min-width:160px;max-width:420px}
.search svg{position:absolute;inset-inline-start:11px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--muted)}
.search .inp{padding-inline-start:36px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(16,36,31,.42);backdrop-filter:blur(2px);z-index:60;display:grid;place-items:center;padding:16px}
.modal{background:var(--surface);border-radius:18px;width:100%;max-width:560px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.25)}
.modal.lg{max-width:820px}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:12px}
.modal-h h3{font-size:17px;font-weight:800}
.modal-b{padding:18px 20px;overflow-y:auto}
.modal-f{padding:14px 20px;border-top:1px solid var(--line-2);display:flex;gap:10px;justify-content:flex-start}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* Toast */
.toasts{position:fixed;top:14px;left:0;right:0;bottom:auto;z-index:95;display:flex;flex-direction:column;align-items:center;gap:9px;padding:0 16px;pointer-events:none}
.toast{background:rgba(17,24,31,.40);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);color:#fff;padding:11px 18px;border-radius:24px;font-weight:700;font-size:14px;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.18);text-shadow:0 1px 3px rgba(0,0,0,.45);display:flex;align-items:center;gap:9px;animation:tin .25s;max-width:min(420px,92vw);text-align:center;justify-content:center;pointer-events:auto}
.toast.ok{background:rgba(21,128,61,.48)} .toast.err{background:rgba(220,38,38,.48)}
@keyframes tin{from{opacity:0;transform:translateY(-10px)}}

/* Empty */
.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty svg{width:42px;height:42px;opacity:.4;margin-bottom:10px}
.empty b{display:block;color:var(--ink);font-size:15px;margin-bottom:3px}

/* Statement / list rows */
.row-line{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--line-2)}
.row-line:last-child{border-bottom:0}
.muted{color:var(--muted)}
.amt-in{color:var(--success);font-weight:800}
.amt-out{color:var(--danger);font-weight:800}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{font-size:13px;font-weight:600;padding:6px 13px;border-radius:20px;border:1px solid var(--line);background:var(--surface);color:var(--muted)}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}

/* Mobile nav */
.mtop{display:none}
.mobilenav{display:none}
@media(max-width:860px){
  .sidebar{display:none}
  .main{margin-inline-end:0}
  .mtop{display:inline-flex}
  .topbar{padding:12px 16px}
  .content{padding:16px 14px 86px}
  .grid2,.grid3{grid-template-columns:1fr}
  .mobilenav{
    display:flex;position:fixed;inset-inline:0;bottom:0;z-index:50;background:var(--surface);
    border-top:1px solid var(--line);padding:6px 4px;justify-content:space-around;
  }
  .mobilenav button{border:0;background:transparent;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:10.5px;font-weight:600;padding:5px 6px;border-radius:10px}
  .mobilenav button svg{width:21px;height:21px}
  .mobilenav button.active{color:var(--primary-d)}
}
@media print{
  .sidebar,.topbar,.mobilenav,.toolbar,.no-print{display:none!important}
  .main{margin:0} .content{padding:0;max-width:100%}
  .panel{box-shadow:none;border:1px solid #ccc}
  body{background:#fff}
}

/* drawer for mobile menu */
.drawer{position:fixed;inset:0;z-index:70;display:none}
.drawer.open{display:block}
.drawer .scrim{position:absolute;inset:0;background:rgba(16,36,31,.4)}
.drawer .sheet{position:absolute;inset-block:0;inset-inline-end:0;width:264px;background:var(--surface);padding:18px 14px;overflow-y:auto;box-shadow:-8px 0 30px rgba(0,0,0,.2)}

/* ====================== واجهة المتجر ====================== */
#storefront{max-width:560px;margin:0 auto;background:#fff;min-height:100vh;padding-bottom:96px}

/* رأس + بحث بأسلوب علي بابا */
.sf-top{background:linear-gradient(165deg,#0A285F,#1D4ED8 70%,#2563EB);color:#fff;padding:0 0 16px;border-radius:0 0 22px 22px;position:relative;overflow:hidden}
.sf-top::before{content:"";position:absolute;top:-70px;inset-inline-start:-50px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(34,211,238,.4),transparent 70%)}
.sf-topbar{position:relative;z-index:2;display:flex;align-items:center;gap:12px;padding:13px 14px 4px}
.sf-ic{width:40px;height:40px;border-radius:12px;border:0;background:rgba(255,255,255,.16);color:#fff;display:grid;place-items:center;position:relative;flex:0 0 auto}
.sf-ic svg{width:20px;height:20px}
.lang-btn{width:auto!important;min-width:40px;padding:0 12px;font-weight:800;font-size:13px;letter-spacing:.5px}
.sf-search .cam.rec{color:#fff;background:var(--danger);border-radius:50%;animation:recPulse 1s infinite}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.5)}50%{box-shadow:0 0 0 6px rgba(220,38,38,0)}}
.sf-brand{flex:1;display:flex;align-items:center;gap:9px;justify-content:center}
.sf-logo{width:36px;height:36px;border-radius:50%;background:#fff center/contain no-repeat;border:2px solid rgba(255,255,255,.8);flex:0 0 auto}
.sf-brand b{font-size:15px;font-weight:800}
.sf-search{position:relative;z-index:2;margin:8px 14px 0;display:flex;align-items:center;background:#fff;border-radius:30px;padding:5px 6px;box-shadow:0 10px 26px rgba(8,25,66,.28)}
.sf-search .cam{width:36px;height:36px;border-radius:50%;border:0;background:transparent;color:var(--primary);display:grid;place-items:center;flex:0 0 auto}
.sf-search .cam svg{width:21px;height:21px}
.sf-search input{flex:1;border:0;outline:none;font-size:14.5px;background:transparent;color:var(--ink);padding:0 6px;min-width:0}
.sf-search .go{border:0;border-radius:24px;padding:10px 17px;color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--cyan-d),var(--primary));flex:0 0 auto}
.sf-search .go svg{width:16px;height:16px}

/* إجراءات سريعة */
.qa-row{display:flex;gap:10px;overflow-x:auto;padding:14px 14px 2px;scrollbar-width:none}
.qa-row::-webkit-scrollbar{display:none}
.qa-card{flex:0 0 auto;display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:11px 14px;box-shadow:var(--shadow)}
.qa-card .qa-ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto}
.qa-card .qa-ic svg{width:20px;height:20px}
.qa-card b{font-size:13px;font-weight:800;color:var(--ink);line-height:1.3;display:block}
.qa-card span{font-size:11px;color:var(--muted)}

/* عناوين الأقسام */
.sf-sec{padding:18px 14px 0}
.sf-sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.sf-sec-h h2{font-size:16.5px;font-weight:800;color:var(--ink)}
.sf-sec-h .more{border:0;background:transparent;color:var(--primary);font-weight:700;font-size:12.5px}

/* تايلات الأقسام */
.cat-row{display:flex;gap:14px;overflow-x:auto;padding:14px 2px 4px;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
.cat-item{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;border:0;background:transparent;width:64px}
.cat-tile{width:60px;height:60px;border-radius:50%;background:linear-gradient(145deg,#EEF4FF,#DDF6FB);border:1px solid #E2EAF5;display:grid;place-items:center;box-shadow:var(--shadow);transition:.15s}
.cat-item:active .cat-tile{transform:scale(.93)}
.cat-tile svg{width:26px;height:26px;color:var(--primary-d)}
.cat-tile.on{background:linear-gradient(145deg,var(--primary),var(--cyan-d));border-color:transparent}
.cat-tile.on svg{color:#fff}
.cat-label{font-size:11.5px;font-weight:600;color:#475569;text-align:center;margin-top:7px;line-height:1.25}

/* صف عروض أفقي */
.deal-row{display:flex;gap:12px;overflow-x:auto;padding:14px 2px 4px;scrollbar-width:none}
.deal-row::-webkit-scrollbar{display:none}
.deal-card{flex:0 0 auto;width:148px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;box-shadow:var(--shadow)}
.deal-img{height:128px;position:relative;background:linear-gradient(135deg,#EEF3FF,#DDF6FB) center/cover no-repeat;display:grid;place-items:center}
.deal-img svg{width:30px;height:30px;color:var(--primary);opacity:.5}
.deal-price{position:absolute;bottom:8px;inset-inline-start:8px;background:rgba(8,25,66,.82);color:#fff;font-weight:800;font-size:13px;padding:3px 10px;border-radius:20px}
.deal-info{padding:9px 11px 11px}
.deal-name{font-size:12.5px;font-weight:600;line-height:1.4;height:35px;overflow:hidden}
.deal-tag{font-size:10.5px;color:#E11D48;font-weight:800;margin-top:3px}

/* تبويبات الأقسام */
.cat-tabs{display:flex;gap:8px;overflow-x:auto;padding:6px 0 4px;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex:0 0 auto;border:0;background:#F1F5F9;color:#475569;font-weight:700;font-size:13px;padding:8px 16px;border-radius:20px}
.cat-tab.on{background:var(--primary);color:#fff}

/* شبكة المنتجات */
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-top:10px}
.prod-card{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.prod-img{height:132px;position:relative;background:linear-gradient(135deg,#EEF3FF,#DDF6FB) center/cover no-repeat;display:grid;place-items:center}
.prod-img svg{width:30px;height:30px;color:var(--primary);opacity:.5}
.prod-badge{position:absolute;bottom:8px;inset-inline-start:8px;background:rgba(8,25,66,.82);color:#fff;font-weight:800;font-size:13px;padding:3px 10px;border-radius:20px}
.prod-out{position:absolute;top:8px;inset-inline-start:8px;background:var(--danger);color:#fff;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px}
.disc-badge{position:absolute;top:8px;inset-inline-end:8px;background:#E11D48;color:#fff;font-size:11px;font-weight:800;padding:2px 8px;border-radius:10px;box-shadow:0 2px 8px rgba(225,29,72,.4)}
.old-price{color:#94A3B8;font-weight:600;font-size:11px;text-decoration:line-through;margin-inline-start:5px}

/* شارات المنتج */
.ptag{position:absolute;top:8px;inset-inline-start:8px;color:#fff;font-size:10.5px;font-weight:800;padding:2px 9px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.tag-new{background:#2563EB}.tag-top{background:#B7791F}.tag-lim{background:#C2410C}
/* قلب المفضّلة */
.fav-btn{position:absolute;bottom:8px;inset-inline-end:8px;width:32px;height:32px;border-radius:50%;border:0;background:rgba(255,255,255,.92);display:grid;place-items:center;box-shadow:0 2px 8px rgba(0,0,0,.18);z-index:2}
.fav-btn svg{width:17px;height:17px;color:#94A3B8}
.fav-btn.on svg{color:#E11D48;fill:#E11D48}
/* عدّاد الكمية على البطاقة */
.card-step{display:flex;align-items:center;gap:8px;background:var(--primary-soft);border-radius:11px;padding:2px}
.card-step button{width:28px;height:28px;border:0;background:#fff;color:var(--primary-d);border-radius:9px;font-size:16px;font-weight:800;display:grid;place-items:center}
.card-step b{min-width:18px;text-align:center;color:var(--primary-d);font-size:14px}
/* معرض الصور في التفاصيل */
.pd-gallery{position:relative}
.pd-main{height:210px;border-radius:16px;background:linear-gradient(135deg,#EEF3FF,#DDF6FB) center/cover no-repeat;display:grid;place-items:center}
.pd-thumbs{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.pd-thumb{width:52px;height:52px;border-radius:10px;background:#eef2f7 center/cover no-repeat;border:2px solid transparent;cursor:pointer}
.pd-thumb.on{border-color:var(--primary)}
/* تذييل المتجر */
.sf-footer{margin-top:26px;background:var(--navy);color:#cbd5e1;padding:22px 18px 24px;text-align:center}
.sf-footer .ft-logo{width:54px;height:54px;border-radius:50%;background:#fff center/contain no-repeat;margin:0 auto 10px}
.sf-footer h4{color:#fff;font-size:16px;font-weight:800;margin-bottom:4px}
.sf-footer .ft-row{font-size:13px;margin:5px 0;display:flex;align-items:center;justify-content:center;gap:7px}
.sf-footer .ft-row svg{width:15px;height:15px;opacity:.85}
.sf-footer .ft-social{display:flex;gap:12px;justify-content:center;margin-top:14px}
.sf-footer .ft-social a{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);display:grid;place-items:center;color:#fff}
.sf-footer .ft-social svg{width:19px;height:19px}
.sf-footer .ft-copy{font-size:11.5px;opacity:.6;margin-top:14px}
/* لماذا + طرق الدفع داخل التذييل */
.ft-why{font-size:13px;font-weight:800;color:#fff;margin:18px 0 9px}
.ft-badges{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:340px;margin:0 auto}
.ft-badge{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:8px 10px;text-align:start}
.ft-badge>span{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;flex:0 0 auto;background:rgba(255,255,255,.13);color:#fff}
.ft-badge>span svg{width:15px;height:15px}
.ft-badge b{font-size:11px;font-weight:800;color:#fff;display:block;line-height:1.25}
.ft-badge i{font-size:9.5px;color:#aebbd0;font-style:normal}
.ft-paytitle{font-size:12.5px;font-weight:800;color:#fff;margin:16px 0 8px}
.ft-pays{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:360px;margin:0 auto}
.ft-pays span{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border-radius:9px;padding:5px 9px;font-size:11px;font-weight:700;color:#e8eef7}
.ft-pays span svg{width:13px;height:13px;color:#cfe0ff}
.ft-info{margin-top:16px}
/* شريط الثقة + طرق الدفع */
.sf-trust{padding:22px 14px 0}
.trust-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.trust-badge{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:var(--shadow)}
.trust-badge .ti{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto;background:var(--primary-soft);color:var(--primary-d)}
.trust-badge .ti svg{width:19px;height:19px}
.trust-badge b{font-size:12.5px;font-weight:800;color:var(--ink);display:block;line-height:1.3}
.trust-badge span{font-size:10.5px;color:var(--muted)}
.pay-title{font-size:14px;font-weight:800;color:var(--ink);margin:18px 0 9px}
.pay-row{display:flex;flex-wrap:wrap;gap:8px}
.pay-chip{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--ink)}
.pay-chip svg{width:15px;height:15px;color:var(--primary)}
/* زر العودة للأعلى */
.to-top{position:fixed;bottom:104px;inset-inline-start:14px;z-index:54;width:42px;height:42px;border-radius:50%;border:0;background:var(--primary);color:#fff;display:none;place-items:center;box-shadow:0 6px 18px rgba(29,78,216,.4)}
.to-top.show{display:grid}
.to-top svg{width:20px;height:20px}

/* ====== الوضع الليلي ====== */
html.dark{--bg:#0E1626;--surface:#16213A;--ink:#E6EDF7;--muted:#93A2BD;--line:#27324A;--line-2:#202b40;--primary-soft:#1B2A4A;--cyan-soft:#16323A}
html.dark body{background:var(--bg);color:var(--ink)}
html.dark #storefront{background:var(--bg)}
html.dark .prod-card,html.dark .deal-card,html.dark .qa-card,html.dark .brand-chip,html.dark .cat-tile{background:var(--surface);border-color:var(--line)}
html.dark .prod-img,html.dark .deal-img,html.dark .pd-main{background:linear-gradient(135deg,#1B2742,#16323A)}
html.dark .sf-search{background:var(--surface)}
html.dark .sf-search input{color:var(--ink)}
html.dark .cat-tab{background:#1B2742;color:#aeb9d0}
html.dark .cat-tab.on{background:var(--primary);color:#fff}
html.dark .store-nav{background:rgba(16,22,38,.95);border-color:var(--line)}
html.dark .cart-sheet,html.dark .modal,html.dark .menu-card{background:var(--surface);color:var(--ink)}
html.dark .menu-item{color:var(--ink);border-color:var(--line-2)}
html.dark .fav-btn{background:rgba(30,41,66,.9)}
html.dark .card-step{background:#1B2A4A}
html.dark .card-step button{background:#0E1626;color:#9fc0ff}
html.dark .inp,html.dark select.inp,html.dark textarea.inp{background:#0E1626;color:var(--ink);border-color:var(--line)}
html.dark .pd-thumb{background-color:#1B2742}
.prod-info{padding:10px 11px 12px;display:flex;flex-direction:column;gap:5px;flex:1}
.prod-cat{font-size:10.5px;color:var(--cyan-d);font-weight:700}
.prod-name{font-size:13px;font-weight:600;line-height:1.45;flex:1}
.prod-foot{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.prod-price{font-size:15px;font-weight:800;color:var(--primary-d)}
.prod-price small{font-size:10px;font-weight:600;color:var(--muted)}
.prod-add{flex:0 0 auto;width:32px;height:32px;border:0;background:var(--primary);color:#fff;border-radius:11px;display:grid;place-items:center}
.prod-add svg{width:16px;height:16px}
.prod-add:active{background:var(--primary-d)}
.prod-add:disabled{background:#cbd5e1}

/* شريط سفلي */
.store-nav{position:fixed;inset-inline:0;bottom:0;z-index:55;max-width:560px;margin:0 auto;background:rgba(255,255,255,.95);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:center;padding:7px 2px 9px}
.sn-item{position:relative;border:0;background:transparent;color:#64748B;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:5px 7px;border-radius:12px}
.sn-item svg{width:22px;height:22px}
.sn-item.active{color:var(--primary)}
.sn-wa svg path{fill:#25D366}
.sn-badge{position:absolute;top:-1px;inset-inline-end:5px;background:var(--cyan);color:#fff;font-size:9.5px;font-weight:800;min-width:16px;height:16px;border-radius:9px;display:grid;place-items:center;padding:0 4px}

/* درج السلة */
.cart-drawer{position:fixed;inset:0;z-index:80;display:none}
.cart-drawer.open{display:block}
.cart-drawer .scrim{position:absolute;inset:0;background:rgba(8,25,66,.5)}
.cart-sheet{position:absolute;inset-inline:0;bottom:0;max-width:560px;margin:0 auto;background:#fff;border-radius:24px 24px 0 0;max-height:82vh;display:flex;flex-direction:column;animation:slideUp .25s}
@keyframes slideUp{from{transform:translateY(100%)}}
.cart-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line-2);font-size:16px;font-weight:800}
.cart-head button{border:0;background:var(--line-2);width:32px;height:32px;border-radius:50%;font-size:15px}
.cart-items{overflow-y:auto;padding:6px 0;flex:1}
.cart-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line-2)}
.cart-foot{padding:16px 18px;border-top:1px solid var(--line-2)}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-ctrl button{width:30px;height:30px;border-radius:9px;border:1px solid var(--line);background:#fff;font-size:16px;font-weight:700}
.store-cta{width:100%;border:0;color:#fff;padding:14px;border-radius:14px;font-size:15px;font-weight:700}

@media(min-width:561px){#storefront,.store-nav,.cart-sheet{box-shadow:0 0 0 1px var(--line)}}

/* القائمة المنسدلة */
.menu-drop{position:fixed;inset:0;z-index:75;display:none}
.menu-drop.open{display:block}
.menu-drop .scrim{position:absolute;inset:0;background:rgba(8,25,66,.35)}
.menu-card{position:absolute;top:60px;inset-inline-start:12px;width:min(264px,74vw);background:#fff;
  border-radius:18px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.32);animation:menuIn .2s}
@keyframes menuIn{from{opacity:0;transform:translateY(-10px) scale(.98)}}
.menu-head{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;
  padding:14px 15px;display:flex;align-items:center;gap:10px}
.menu-ava{width:40px;height:40px;border-radius:50%;flex:0 0 auto;background:#fff center/contain no-repeat;
  border:2px solid rgba(255,255,255,.75)}
.menu-name{font-size:15px;font-weight:800;flex:1}
.menu-list{padding:2px 0}
.menu-item{display:flex;align-items:center;gap:12px;width:100%;padding:12px 15px;border:0;background:transparent;
  text-align:start;font-size:14px;font-weight:700;color:#1e293b;border-bottom:1px solid var(--line-2)}
.menu-item:last-child{border-bottom:0}
.menu-item:active{background:var(--line-2)}
.menu-item .mlabel{flex:1}
.menu-item .micon{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto}
.menu-item .micon svg{width:17px;height:17px}
</style>
</head>
<body>

<!-- ====================== واجهة المتجر (الزبائن) ====================== -->
<div id="storefront">
  <header class="sf-top">
    <div class="sf-topbar">
      <button class="sf-ic" onclick="openStoreMenu()" aria-label="القائمة">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <div class="sf-brand"><div class="sf-logo" id="sfLogo"></div><b data-i18n="brand">مؤسسة الصداقة</b></div>
      <button class="sf-ic lang-btn" id="langBtn" onclick="toggleLang()" aria-label="اللغة">FR</button>
      <button class="sf-ic" onclick="openCart()" aria-label="السلة">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.6"/><circle cx="17" cy="20" r="1.6"/><path d="M2 3h3l2.5 12.5a1.6 1.6 0 0 0 1.6 1.3h8.3a1.6 1.6 0 0 0 1.6-1.2L22 7H6"/></svg>
        <span class="sn-badge" id="cartCountHero" style="display:none">0</span></button>
    </div>
    <div class="sf-search">
      <button class="cam" onclick="openImageSearch('store')" aria-label="بحث بصورة">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h3l2-2h8l2 2h3v12H3z"/><circle cx="12" cy="13" r="3.2"/></svg></button>
      <button class="cam" onclick="startVoiceSearch()" aria-label="بحث صوتي" id="micBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></button>
      <input id="storeQ" data-i18n-ph="searchPh" placeholder="ابحث عن منتج أو كود..." oninput="renderStoreGrid()" onfocus="scrollToProducts()">
      <button class="go" onclick="scrollToProducts()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><span data-i18n="search">بحث</span></button>
    </div>
  </header>

  <div class="qa-row">
    <button class="qa-card" onclick="scrollToProducts()"><span class="qa-ic" style="background:#E5EDFF;color:#1D4ED8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span><div><b data-i18n="qaCats">تصفّح الأقسام</b><span data-i18n="qaCatsSub">كل المنتجات</span></div></button>
    <button class="qa-card" onclick="scrollToDeals()"><span class="qa-ic" style="background:#FBF1DE;color:#B7791F"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12v3a6 6 0 0 1-12 0zM4 5h2M18 5h2M9 14h6M8 20h8M10 14v3M14 14v3"/></svg></span><div><b data-i18n="qaTop">الأكثر مبيعاً</b><span data-i18n="qaTopSub">أفضل العروض</span></div></button>
    <button class="qa-card" onclick="openWhatsApp()"><span class="qa-ic" style="background:#E7F7EE;color:#25D366"><svg viewBox="0 0 24 24" fill="#25D366"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2zm0 18.2c-1.6 0-3-.4-4.3-1.2l-.3-.2-2.9.8.8-2.8-.2-.3A8.2 8.2 0 1 1 12 20.2z"/></svg></span><div><b data-i18n="qaWa">طلب عبر واتساب</b><span data-i18n="qaWaSub">تواصل سريع</span></div></button>
  </div>

  <section class="sf-sec">
    <div class="sf-sec-h"><h2 data-i18n="secCats">الأقسام</h2><button class="more" onclick="storeCat='';renderCats();renderCatTabs();renderStoreGrid()" data-i18n="seeAll">عرض الكل ›</button></div>
    <div class="cat-row" id="catRow"></div>
  </section>

  <section class="sf-sec" id="dealsSec">
    <div class="sf-sec-h"><h2 data-i18n="secDeals">أفضل العروض</h2><button class="more" onclick="scrollToProducts()" data-i18n="more">المزيد ›</button></div>
    <div class="deal-row" id="dealRow"></div>
  </section>

  <section class="sf-sec" id="productsSec" style="padding-top:18px">
    <div class="sf-sec-h"><h2 id="prodSecTitle">كل المنتجات</h2></div>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="prod-grid" id="storeGrid"></div>
  </section>
</div>

<nav class="store-nav" id="storeNav">
  <button class="sn-item active" onclick="scrollStoreTop()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8M5 9v11h14V9"/></svg><span data-i18n="navHome">الرئيسية</span></button>
  <button class="sn-item" onclick="scrollToProducts()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span data-i18n="navCats">الأقسام</span></button>
  <button class="sn-item" onclick="openCart()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.6"/><circle cx="17" cy="20" r="1.6"/><path d="M2 3h3l2.5 12.5a1.6 1.6 0 0 0 1.6 1.3h8.3a1.6 1.6 0 0 0 1.6-1.2L22 7H6"/></svg>
    <span class="sn-badge" id="cartCount" style="display:none">0</span><span data-i18n="navCart">السلة</span></button>
  <button class="sn-item sn-wa" onclick="openWhatsApp()">
    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2zm0 18.2c-1.6 0-3-.4-4.3-1.2l-.3-.2-2.9.8.8-2.8-.2-.3A8.2 8.2 0 1 1 12 20.2zm4.5-6.1c-.2-.1-1.4-.7-1.7-.8-.2-.1-.4-.1-.5.1-.2.2-.6.8-.7 1-.2.1-.3.1-.5 0-1.4-.6-2.3-1.2-3.2-2.8-.2-.4.2-.4.6-1.3.1-.1 0-.3 0-.4 0-.1-.5-1.3-.7-1.8-.2-.5-.4-.4-.5-.4h-.5c-.1 0-.4.1-.6.3-.2.2-.8.8-.8 2s.9 2.3 1 2.5c.1.2 1.7 2.7 4.2 3.7 1.6.6 2.2.7 2.9.6.5-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1 0-.1-.2-.2-.4-.3z" fill="#25D366"/></svg><span data-i18n="navWa">واتساب</span></button>
  <button class="sn-item" onclick="adminLogin()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="3.4"/><path d="M5 20a7 7 0 0 1 14 0"/></svg><span data-i18n="navAccount">حساب</span></button>
</nav>

<button class="to-top" id="toTop" onclick="scrollStoreTop()" aria-label="up"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>

<!-- درج السلة -->
<div class="cart-drawer" id="cartDrawer">
  <div class="scrim" onclick="closeCart()"></div>
  <div class="cart-sheet">
    <div class="cart-head"><span>🛒 سلة المشتريات</span><button onclick="closeCart()">✕</button></div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-foot" id="cartFoot"></div>
  </div>
</div>

<!-- القائمة المنسدلة (زر الثلاث شرطات) -->
<div class="menu-drop" id="storeMenu">
  <div class="scrim" onclick="closeStoreMenu()"></div>
  <div class="menu-card">
    <div class="menu-head" onclick="setGuestName()" style="cursor:pointer">
      <div class="menu-ava" id="menuAva"></div>
      <div class="menu-name">زائر</div>
    </div>
    <div class="menu-list">
      <button class="menu-item" onclick="closeStoreMenu();openCart()">
        <span class="mlabel" data-i18n="mOrders">طلباتي</span>
        <span class="micon" style="background:#FEF3E2;color:#C2710C">${''}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="9" cy="20" r="1.6"/><circle cx="17" cy="20" r="1.6"/><path d="M2 3h3l2.5 12.5a1.6 1.6 0 0 0 1.6 1.3h8.3a1.6 1.6 0 0 0 1.6-1.2L22 7H6"/></svg></span>
      </button>
      <button class="menu-item" onclick="closeStoreMenu();openFavorites()">
        <span class="mlabel" data-i18n="favorites">المفضّلة</span>
        <span class="micon" style="background:#FCE7EE;color:#E11D48"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M12 21s-7-4.5-9.5-8.5A5.2 5.2 0 0 1 12 6a5.2 5.2 0 0 1 9.5 6.5C19 16.5 12 21 12 21z"/></svg></span>
      </button>
      <button class="menu-item" onclick="toggleDark()">
        <span class="mlabel" data-i18n="darkMode">الوضع الليلي</span>
        <span class="micon" id="darkIcon" style="background:#E5EDFF;color:#1D4ED8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></span>
      </button>
      <button class="menu-item" onclick="closeStoreMenu();showAbout()">
        <span class="mlabel" data-i18n="mAbout">معلومات عنا</span>
        <span class="micon" style="background:#E5EDFF;color:#1D4ED8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="18" height="18"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg></span>
      </button>
      <button class="menu-item" onclick="closeStoreMenu();showTerms()">
        <span class="mlabel" data-i18n="mTerms">الشروط والاستخدام</span>
        <span class="micon" style="background:#FBE9E9;color:#DC2626"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M6 2h9l5 5v15H6z"/><path d="M9 8h4M9 12h7M9 16h7"/></svg></span>
      </button>
      <button class="menu-item" onclick="closeStoreMenu();openWhatsApp()">
        <span class="mlabel" data-i18n="mSupport">فريق الدعم</span>
        <span class="micon" style="background:#E7F7EE;color:#25D366"><svg viewBox="0 0 24 24" fill="#25D366" width="18" height="18"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2zm0 18.2c-1.6 0-3-.4-4.3-1.2l-.3-.2-2.9.8.8-2.8-.2-.3A8.2 8.2 0 1 1 12 20.2z"/></svg></span>
      </button>
      <button class="menu-item" onclick="closeStoreMenu();adminLogin()">
        <span class="mlabel" data-i18n="mAdmin">دخول كمدير</span>
        <span class="micon" style="background:#E5EDFF;color:#1D4ED8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg></span>
      </button>
    </div>
  </div>
</div>

<!-- ====================== لوحة الإدارة (تظهر بعد دخول المدير) ====================== -->
<div id="adminUI" class="hidden">
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo">ص</div>
      <div><b>مؤسسة الصداقة</b><span>للتجارة العامة</span></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">نظام إدارة متكامل · v1.0</div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">

/* ====================== التخزين ====================== */
const KEY='sadaqa_erp_v1';
let DB=null;

  try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}
  return null;
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(DB));}
  catch(e){/* في معاينة التطبيق قد لا يُحفظ — يعمل بعد التنزيل */}
}
function uid(p){return p+'_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function seed(){
  const cats=['مواد البناء','الكهرباء','السباكة','الأدوات اليدوية','المعدات','الزراعة','الدهانات','مستلزمات المنازل'];

    ['إسمنت بورتلاندي 50كغ','BLD-001','مواد البناء',8.5,6.2,140,30],

    ['حديد تسليح 12مم','BLD-022','مواد البناء',45,38,6,10],
    ['كابل نحاس 2.5مم (لفة)','ELC-101','الكهرباء',95,78,22,8],
    ['مفتاح كهربائي مزدوج','ELC-118','الكهرباء',3.2,2.1,0,15],
    ['لمبة LED 12واط','ELC-140','الكهرباء',2.8,1.6,210,40,4.0],
    ['أنبوب PVC 4 إنش','PLM-205','السباكة',12,9,34,12],
    ['خلاط مغسلة','PLM-233','السباكة',38,29,9,6],
    ['مطرقة 500غ','TLS-300','الأدوات اليدوية',9,6,18,10],
    ['طقم مفكات 6 قطع','TLS-312','الأدوات اليدوية',22,15,4,8],
    ['دريل كهربائي 650واط','EQP-400','المعدات',120,95,7,3,150],
    ['دهان أبيض 18لتر','PNT-500','الدهانات',65,52,15,6,80],
    ['خرطوم ري 50م','AGR-600','الزراعة',28,21,11,5],
  ];
  const products=sample.map(s=>({id:uid('p'),name:s[0],code:s[1],category:s[2],price:s[3],wholesale:s[4],qty:s[5],minQty:s[6],oldPrice:s[7]||0,desc:''}));
  const customers=[
    {id:uid('c'),name:'محمد العامري',phone:'0770xxxxxx',address:'السوق الكبير',balance:0},
    {id:uid('c'),name:'مقاولات النور',phone:'0780xxxxxx',address:'الحي الصناعي',balance:0},
  ];
  const suppliers=[
    {id:uid('s'),name:'شركة الإعمار للمواد',phone:'0790xxxxxx',address:'',balance:0},
  ];
  return {
    products,categories:cats,customers,suppliers,
    sales:[],purchases:[],expenses:[],cash:[],
    settings:{cashStart:0,role:'المدير',currency:'د.ع',whatsapp:'22222227268'},
    seq:{sale:1,purchase:1}

}
DB=load()||seed();
// migrate guard
['products','categories','customers','suppliers','sales','purchases','expenses','cash'].forEach(k=>{if(!DB[k])DB[k]=[];});
if(!DB.settings)DB.settings={cashStart:0,role:'المدير',currency:'د.ع'};
if(!DB.seq)DB.seq={sale:1,purchase:1};
if(!DB.fav)DB.fav=[];
if(!DB.settings.whatsapp)DB.settings.whatsapp='22222227268';
if(!DB.settings.payments)DB.settings.payments=['نقداً عند الاستلام','تحويل / حوالة','بطاقة (ماستر/فيزا)','بنكيلي','مصرفي','سداد','امانتي','كليك'];
// حسابات الموظفين الافتراضية (صاحب 1، مدير 1، محاسب 1، مسيّرون 6)
if(!DB.users||!DB.users.length){
  DB.users=[
    {id:uid('u'),name:'الصاحب',username:'owner',pass:'owner',role:'صاحب'},
    {id:uid('u'),name:'المدير',username:'manager',pass:'manager',role:'مدير'},

  ];
  for(let i=1;i<=6;i++)DB.users.push({id:uid('u'),name:'مسيّر '+i,username:'staff'+i,pass:'staff'+i,role:'مسيّر'});

}
// صلاحيات كل دور (أقسام لوحة الإدارة المسموحة)
const ROLE_PAGES={
  'صاحب':['dash','store','inventory','sale','purchase','customers','suppliers','expenses','cash','reports','settings','users'],
  'مدير':['dash','store','inventory','sale','purchase','customers','suppliers','expenses','cash','reports','settings'],
  'محاسب':['dash','customers','suppliers','expenses','cash','reports'],
  'مسيّر':['store','inventory','sale','purchase'],
};
let CUR_USER=null;
function allowedPages(){return CUR_USER?(ROLE_PAGES[CUR_USER.role]||['dash']):[];}
function can(id){return allowedPages().includes(id);}

/* ====================== المفضّلة + السلة المحفوظة + الصور ====================== */
function isFav(id){return DB.fav.includes(id);}
function toggleFav(id){const i=DB.fav.indexOf(id);if(i>=0)DB.fav.splice(i,1);else DB.fav.push(id);save();}
function prodImgs(p){return (p.images&&p.images.length)?p.images:(p.image?[p.image]:[]);}
function prodImg(p){const a=prodImgs(p);return a.length?a[0]:'';}
const CART_KEY='sadaqa_cart_v1';
function saveCart(){try{localStorage.setItem(CART_KEY,JSON.stringify(CART));}catch(e){}}
function loadCart(){try{const r=localStorage.getItem(CART_KEY);if(r)return JSON.parse(r);}catch(e){}return[];}
function cartQtyOf(id){const l=CART.find(c=>c.id===id);return l?l.qty:0;}
// مبيعات كل منتج (للأكثر مبيعاً)
let _topSellers=null;
function topSellers(){
  if(_topSellers)return _topSellers;
  const m={};DB.sales.forEach(s=>s.items.forEach(i=>{m[i.name]=(m[i.name]||0)+i.qty;}));
  _topSellers=Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,5).map(e=>e[0]);
  return _topSellers;
}
function productTag(p){
  if(p.qty<=0)return null; // نفد يُعرض منفصلاً
  if(p.createdAt&&(Date.now()-p.createdAt)<14*864e5)return{text:t('tagNew'),cls:'tag-new'};
  if(topSellers().includes(p.name))return{text:t('tagTop'),cls:'tag-top'};
  if(p.qty<=p.minQty)return{text:t('tagLimited'),cls:'tag-lim'};
  return null;
}

/* ====================== أدوات ====================== */
const CUR=()=>DB.settings.currency||'د.ع';
function money(n){n=Number(n)||0;return n.toLocaleString('en-US',{maximumFractionDigits:2});}
function m(n){return money(n)+' '+CUR();}
function todayISO(){return new Date().toISOString().slice(0,10);}
const AR_MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const FR_MONTHS=['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
function fmtDate(iso){if(!iso)return'';const d=new Date(iso);const mo=(typeof LANG!=='undefined'&&LANG==='fr')?FR_MONTHS:AR_MONTHS;return d.getDate()+' '+mo[d.getMonth()]+' '+d.getFullYear();}
function startOf(period){
  const d=new Date();d.setHours(0,0,0,0);
  if(period==='day')return d;
  if(period==='week'){d.setDate(d.getDate()-6);return d;}
  if(period==='month'){d.setDate(1);return d;}
  if(period==='year'){d.setMonth(0,1);return d;}
  return new Date(0);
}
function _toastFade(el){el.style.opacity='0';el.style.transition='.3s';setTimeout(()=>el.remove(),300);}
function toast(msg,type){
  const box=document.getElementById('toasts');
  const cur=box.lastElementChild;
  // نفس الرسالة ظاهرة؟ أعد ضبط المؤقّت فقط (لا تكرار)
  if(cur&&cur.dataset.msg===msg&&cur.dataset.type===(type||'')){
    clearTimeout(cur._timer);cur._timer=setTimeout(()=>_toastFade(cur),2400);return;
  }
  // واحد يكفي: أزل أي تنبيهات سابقة
  Array.from(box.children).forEach(c=>{clearTimeout(c._timer);c.remove();});
  const t=document.createElement('div');t.className='toast '+(type||'');
  t.dataset.msg=msg;t.dataset.type=type||'';
  t.innerHTML=(type==='ok'?svg(I.check,17):type==='err'?svg(I.alert,17):'')+`<span>${msg}</span>`;
  box.appendChild(t);
  t._timer=setTimeout(()=>_toastFade(t),2400);
}
function stockStatus(p){
  if(p.qty<=0)return{c:'b-out',t:'نفد'};
  if(p.qty<=p.minQty)return{c:'b-low',t:'منخفض'};
  return{c:'b-ok',t:'متوفر'};
}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function discPct(p){return (p.oldPrice&&p.oldPrice>p.price)?Math.round((1-p.price/p.oldPrice)*100):0;}

/* ====================== الصندوق ====================== */
function cashBalance(){
  let b=Number(DB.settings.cashStart)||0;
  DB.cash.forEach(c=>{b+=(c.type==='in'?c.amount:-c.amount);});
  return b;
}
function addCash(type,amount,note,ref){
  DB.cash.push({id:uid('m'),date:todayISO(),type,amount:Number(amount)||0,note:note||'',ref:ref||''});
}

/* ====================== التنقل ====================== */
const PAGES=[
  {id:'dash',t:'لوحة التحكم',sub:'نظرة عامة على أداء المؤسسة',icon:I.dash,m:1},

  {id:'expenses',t:'المصروفات',sub:'تسجيل ومتابعة المصاريف',icon:I.expense},

let current='dash';
function buildNav(){
  const pages=PAGES.filter(p=>p.sep||can(p.id));
  const html=pages.map(p=>p.sep?'<div class="sep"></div>':
    `<button data-id="${p.id}" onclick="go('${p.id}')">${svg(p.icon)}<span>${p.t}</span></button>`).join('');
  document.getElementById('nav').innerHTML=html;
  document.getElementById('navDrawer').innerHTML=html;
  const mob=pages.filter(p=>!p.sep).slice(0,5);
  document.getElementById('mnav').innerHTML=mob.map(p=>
    `<button data-id="${p.id}" onclick="go('${p.id}')">${svg(p.icon,21)}<span>${p.t.split(' ')[0]}</span></button>`).join('');
}
function go(id){
  if(!can(id))id=allowedPages()[0]||'dash';
  current=id;closeDrawer();
  const p=PAGES.find(x=>x.id===id);

  document.getElementById('pageSub').textContent=p.sub;

function openDrawer(){document.getElementById('drawer').classList.add('open');}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');}

/* ====================== العرض الرئيسي ====================== */
function render(){
  const v=document.getElementById('view');
  ({dash:vDash,store:vStore,inventory:vInventory,sale:vSale,purchase:vPurchase,customers:vCustomers,
    suppliers:vSuppliers,expenses:vExpenses,cash:vCash,reports:vReports,settings:vSettings,users:vUsers}[current]||vDash)(v);
}

/* ---------- لوحة التحكم ---------- */
function vDash(v){
  const totalSalesToday=DB.sales.filter(s=>new Date(s.date)>=startOf('day')).reduce((a,s)=>a+s.total,0);
  const profitToday=DB.sales.filter(s=>new Date(s.date)>=startOf('day')).reduce((a,s)=>a+(s.profit||0),0);
  const debts=DB.customers.reduce((a,c)=>a+Math.max(0,c.balance),0);
  const low=DB.products.filter(p=>p.qty<=p.minQty);
  const cards=[
    ['المنتجات',DB.products.length,'',I.box,'var(--primary)','var(--primary-soft)'],
    ['العملاء',DB.customers.length,'',I.people,'#2563eb','#e7effd'],
    ['الموردون',DB.suppliers.length,'',I.truck,'#7c3aed','#efe7fd'],
    ['مبيعات اليوم',money(totalSalesToday),CUR(),I.invoice,'var(--success)','var(--success-soft)'],
    ['أرباح اليوم',money(profitToday),CUR(),I.trend,'var(--gold)','var(--gold-soft)'],
    ['الديون المستحقة',money(debts),CUR(),I.wallet,'var(--danger)','var(--danger-soft)'],
    ['رصيد الصندوق',money(cashBalance()),CUR(),I.wallet,'var(--primary)','var(--primary-soft)'],
    ['تنبيهات المخزون',low.length,'',I.alert,'var(--warn)','var(--warn-soft)'],
  ];
  v.innerHTML=`
  <div class="cards">${cards.map(c=>`
    <div class="card stat">
      <div class="top">
        <span class="label">${c[0]}</span>
        <span class="pill" style="background:${c[5]};color:${c[4]}">${svg(c[3],18)}</span>
      </div>
      <div class="val t-num">${c[1]} ${c[2]?`<small>${c[2]}</small>`:''}</div>
    </div>`).join('')}
  </div>

  <div style="margin-top:18px;display:grid;grid-template-columns:1.4fr 1fr;gap:16px" class="dash-grid">
    <div class="panel">

    ${list.map(p=>{const s=stockStatus(p);return`<tr>

      <td class="muted">${esc(p.category)}</td>

function adjustStock(id){

      <div class="field"><label>حد التنبيه</label><input class="inp" id="a_min" type="number" step="any" value="${p.minQty}"></div>

}

/* ---------- فاتورة بيع ---------- */
let cart=[];let saleCustomer='';
function vSale(v){
  v.innerHTML=`
  <div style="display:grid;grid-template-columns:1.5fr 1fr;gap:16px" class="sale-grid">
    <div class="panel">
      <div class="panel-h">${svg(I.box,18)}<h3>اختر المنتجات</h3></div>
      <div style="padding:12px 16px;display:flex;gap:8px">
        <div class="search" style="max-width:none;flex:1"><span></span>${svg(I.search,17)}<input class="inp" id="saleSearch" placeholder="ابحث عن منتج لإضافته..." oninput="renderSaleProducts()"></div>
        <button class="btn" onclick="scanBarcode(saleScanAdd)" title="مسح باركود">${svg(I.search,17)} مسح</button>
      </div>
      <div class="tbl-wrap" id="saleProducts" style="max-height:420px;overflow:auto"></div>
    </div>
    <div class="panel">
      <div class="panel-h">${svg(I.invoice,18)}<h3>الفاتورة</h3></div>
      <div style="padding:14px 16px">
        <div class="field" style="margin-bottom:12px"><label>العميل</label>
          <select class="inp" id="saleCustomer">
            <option value="">عميل نقدي (بدون اسم)</option>
            ${DB.customers.map(c=>`<option value="${c.id}" ${saleCustomer===c.id?'selected':''}>${esc(c.name)}</option>`).join('')}
          </select></div>
        <div id="cartBox"></div>
      </div>
    </div>
  </div>
  <style>@media(max-width:860px){.sale-grid{grid-template-columns:1fr!important}}</style>`;
  renderSaleProducts();renderCart();
  document.getElementById('saleCustomer').onchange=e=>saleCustomer=e.target.value;
}
function renderSaleProducts(){
  const box=document.getElementById('saleProducts');if(!box)return;
  const q=(document.getElementById('saleSearch').value||'').trim().toLowerCase();
  const list=DB.products.filter(p=>!q||p.name.toLowerCase().includes(q)||(p.code||'').toLowerCase().includes(q)).slice(0,40);
  box.innerHTML=`<table><tbody>${list.map(p=>`<tr>
    <td><b>${esc(p.name)}</b><div class="muted" style="font-size:12px">${esc(p.code||'')} · متوفر: ${p.qty}</div></td>
    <td class="t-num">${m(p.price)}</td>
    <td style="text-align:end"><button class="btn btn-primary btn-sm" ${p.qty<=0?'disabled style="opacity:.4"':''} onclick="addToCart('${p.id}')">${svg(I.plus,15)} إضافة</button></td>
  </tr>`).join('')||`<tr><td><div class="empty">لا نتائج</div></td></tr>`}</tbody></table>`;
}
function saleScanAdd(code){
  const c=String(code).trim().toLowerCase();
  let p=DB.products.find(x=>(x.code||'').toLowerCase()===c)||DB.products.find(x=>(x.code||'').toLowerCase().includes(c));
  if(!p){toast('لا يوجد منتج بهذا الكود','err');const s=document.getElementById('saleSearch');if(s){s.value=code;renderSaleProducts();}return;}
  if(p.qty<=0){toast('المنتج نافد','err');return;}
  addToCart(p.id);toast('أُضيف: '+p.name,'ok');
}
function addToCart(id){
  const p=DB.products.find(x=>x.id===id);
  const line=cart.find(c=>c.id===id);
  if(line){if(line.qty<p.qty)line.qty++;else{toast('لا توجد كمية كافية','err');return;}}
  else cart.push({id,name:p.name,price:p.price,cost:p.wholesale,qty:1,max:p.qty});
  renderCart();
}
function renderCart(){
  const box=document.getElementById('cartBox');if(!box)return;
  if(!cart.length){box.innerHTML=`<div class="empty" style="padding:30px 10px">${svg(I.invoice,40)}<b>الفاتورة فارغة</b>أضف منتجات من القائمة</div>`;return;}
  const total=cart.reduce((a,l)=>a+l.price*l.qty,0);
  box.innerHTML=`
  <div style="border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:12px">
    ${cart.map((l,i)=>`<div class="row-line">
      <div style="flex:1"><b style="font-size:13.5px">${esc(l.name)}</b>
        <div class="muted" style="font-size:12px">${m(l.price)} × ${l.qty} = ${money(l.price*l.qty)}</div></div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="btn btn-icon btn-sm" onclick="cartQty(${i},-1)">−</button>
        <span class="t-num" style="min-width:22px;text-align:center"><b>${l.qty}</b></span>
        <button class="btn btn-icon btn-sm" onclick="cartQty(${i},1)">+</button>
        <button class="btn btn-icon btn-sm btn-ghost" onclick="cartDel(${i})">${svg(I.trash,15)}</button>
      </div>
    </div>`).join('')}
  </div>
  <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:800;padding:6px 2px 12px">
    <span>الإجمالي</span><span class="t-num">${m(total)}</span></div>
  <div class="field" style="margin-bottom:12px"><label>المبلغ المدفوع</label>
    <input class="inp" id="paidAmt" type="number" step="any" value="${total}" oninput="updateRemain(${total})"></div>
  <div style="display:flex;justify-content:space-between;font-weight:700;color:var(--danger)" id="remainRow"></div>
  <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:14px;padding:12px" onclick="checkout()">${svg(I.check,18)} إتمام البيع وحفظ الفاتورة</button>`;
  updateRemain(total);
}
function cartQty(i,d){const l=cart[i];const nq=l.qty+d;if(nq<=0){cart.splice(i,1);}else if(nq>l.max){toast('تجاوزت الكمية المتوفرة','err');return;}else l.qty=nq;renderCart();}
function cartDel(i){cart.splice(i,1);renderCart();}
function updateRemain(total){
  const paid=parseFloat(val('paidAmt'))||0;const rem=total-paid;
  const r=document.getElementById('remainRow');if(!r)return;
  r.innerHTML=rem>0?`<span>المتبقي (آجل)</span><span class="t-num">${m(rem)}</span>`:rem<0?`<span style="color:var(--success)">الباقي للعميل</span><span class="t-num" style="color:var(--success)">${m(-rem)}</span>`:`<span style="color:var(--success)">مدفوعة بالكامل ✓</span><span></span>`;
}
function checkout(){
  if(!cart.length){toast('الفاتورة فارغة','err');return;}
  const total=cart.reduce((a,l)=>a+l.price*l.qty,0);
  const profit=cart.reduce((a,l)=>a+(l.price-l.cost)*l.qty,0);
  let paid=parseFloat(val('paidAmt'));if(isNaN(paid))paid=total;
  const remaining=Math.max(0,total-paid);
  const custId=document.getElementById('saleCustomer').value;
  const cust=DB.customers.find(c=>c.id===custId);
  if(remaining>0&&!cust){toast('البيع الآجل يتطلب اختيار عميل','err');return;}
  // update stock
  cart.forEach(l=>{const p=DB.products.find(x=>x.id===l.id);if(p)p.qty=Math.max(0,p.qty-l.qty);});
  const no=DB.seq.sale++;
  const sale={id:uid('inv'),no,date:new Date().toISOString(),customerId:custId||'',customerName:cust?cust.name:'عميل نقدي',
    items:cart.map(l=>({name:l.name,price:l.price,qty:l.qty})),total,paid:Math.min(paid,total),remaining,profit};
  DB.sales.push(sale);
  if(cust)cust.balance+=remaining;
  if(Math.min(paid,total)>0)addCash('in',Math.min(paid,total),'فاتورة بيع #'+no,sale.id);
  save();
  cart=[];saleCustomer='';
  toast('تم حفظ الفاتورة #'+no,'ok');
  showInvoice(sale);
  render();
}
function showInvoice(sale){
  modal({title:'فاتورة بيع #'+sale.no,size:'lg',body:`

function vPurchase(v){
  if(!DB.suppliers.length){
    v.innerHTML=`<div class="panel"><div class="empty">${svg(I.truck,42)}<b>لا يوجد موردون بعد</b>أضف مورداً أولاً من صفحة الموردين<div style="margin-top:12px"><button class="btn btn-primary" onclick="go('suppliers')">الذهاب للموردين</button></div></div></div>`;return;

    <div class="panel">

      <div style="padding:12px 16px;display:flex;gap:8px">
        <div class="search" style="max-width:none;flex:1"><span></span>${svg(I.search,17)}<input class="inp" id="purchSearch" placeholder="ابحث عن منتج..." oninput="renderPurchProducts()"></div>
        <button class="btn" onclick="scanBarcode(purchScanAdd)">${svg(I.search,17)} مسح</button>
      </div>
      <div class="tbl-wrap" id="purchProducts" style="max-height:420px;overflow:auto"></div>
    </div>
    <div class="panel">
      <div class="panel-h">${svg(I.truck,18)}<h3>فاتورة الشراء</h3></div>

          <select class="inp" id="purchSupplier">
            ${DB.suppliers.map(s=>`<option value="${s.id}" ${purchSupplier===s.id?'selected':''}>${esc(s.name)}</option>`).join('')}
          </select></div>
        <div id="pcartBox"></div>
      </div>
    </div>
  </div>
  <style>@media(max-width:860px){.sale-grid{grid-template-columns:1fr!important}}</style>
  <div class="panel" style="margin-top:16px">

function recentPurchasesTable(){
  const rows=[...DB.purchases].reverse().slice(0,8);
  if(!rows.length)return `<div class="empty">${svg(I.truck,42)}<b>لا فواتير شراء بعد</b></div>`;
  return `<table><thead><tr><th>الرقم</th><th>المورد</th><th>التاريخ</th><th>الإجمالي</th><th>الحالة</th></tr></thead><tbody>
  ${rows.map(s=>`<tr><td class="code-tag">#${s.no}</td><td>${esc(s.supplierName)}</td><td class="muted">${fmtDate(s.date)}</td>
    <td class="t-num"><b>${m(s.total)}</b></td>
    <td>${s.remaining>0?`<span class="badge b-low">آجل ${money(s.remaining)}</span>`:`<span class="badge b-ok">مدفوعة</span>`}</td></tr>`).join('')}</tbody></table>`;
}
function renderPurchProducts(){
  const box=document.getElementById('purchProducts');if(!box)return;
  const q=(document.getElementById('purchSearch').value||'').trim().toLowerCase();
  const list=DB.products.filter(p=>!q||p.name.toLowerCase().includes(q)||(p.code||'').toLowerCase().includes(q)).slice(0,40);
  box.innerHTML=`<table><tbody>${list.map(p=>`<tr>
    <td><b>${esc(p.name)}</b><div class="muted" style="font-size:12px">${esc(p.code||'')} · المخزون: ${p.qty}</div></td>
    <td class="t-num muted">جملة ${money(p.wholesale)}</td>
    <td style="text-align:end"><button class="btn btn-primary btn-sm" onclick="addToPcart('${p.id}')">${svg(I.plus,15)} استلام</button></td>
  </tr>`).join('')||`<tr><td><div class="empty">لا نتائج</div></td></tr>`}</tbody></table>`;
}
function purchScanAdd(code){
  const c=String(code).trim().toLowerCase();
  let p=DB.products.find(x=>(x.code||'').toLowerCase()===c);
  if(!p){toast('لا يوجد منتج بهذا الكود','err');return;}
  addToPcart(p.id);toast('أُضيف: '+p.name,'ok');
}
function addToPcart(id){
  const p=DB.products.find(x=>x.id===id);
  const line=pcart.find(c=>c.id===id);
  if(line)line.qty++;else pcart.push({id,name:p.name,cost:p.wholesale,qty:1});
  renderPcart();
}
function renderPcart(){
  const box=document.getElementById('pcartBox');if(!box)return;
  if(!pcart.length){box.innerHTML=`<div class="empty" style="padding:30px 10px">${svg(I.truck,40)}<b>لا مواد بعد</b>أضف المواد المستلمة</div>`;return;}
  const total=pcart.reduce((a,l)=>a+l.cost*l.qty,0);
  box.innerHTML=`
  <div style="border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:12px">
    ${pcart.map((l,i)=>`<div class="row-line">
      <div style="flex:1"><b style="font-size:13.5px">${esc(l.name)}</b></div>
      <div style="display:flex;align-items:center;gap:6px">
        <input class="inp" style="width:74px;padding:6px 8px" type="number" step="any" value="${l.cost}" oninput="pcart[${i}].cost=parseFloat(this.value)||0;pcartTotal()" title="سعر الشراء">
        <button class="btn btn-icon btn-sm" onclick="pcartQty(${i},-1)">−</button>
        <span class="t-num" style="min-width:20px;text-align:center"><b>${l.qty}</b></span>
        <button class="btn btn-icon btn-sm" onclick="pcartQty(${i},1)">+</button>
        <button class="btn btn-icon btn-sm btn-ghost" onclick="pcartDel(${i})">${svg(I.trash,15)}</button>
      </div>
    </div>`).join('')}
  </div>
  <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:800;padding:6px 2px 12px">
    <span>الإجمالي</span><span class="t-num" id="pcartTotalTxt">${m(total)}</span></div>
  <div class="field" style="margin-bottom:12px"><label>المبلغ المدفوع للمورد</label>
    <input class="inp" id="ppaidAmt" type="number" step="any" value="${total}"></div>
  <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:6px;padding:12px" onclick="checkoutPurchase()">${svg(I.check,18)} حفظ فاتورة الشراء وتحديث المخزون</button>`;
}
function pcartTotal(){const t=pcart.reduce((a,l)=>a+l.cost*l.qty,0);const e=document.getElementById('pcartTotalTxt');if(e)e.textContent=m(t);}
function pcartQty(i,d){pcart[i].qty+=d;if(pcart[i].qty<=0)pcart.splice(i,1);renderPcart();}
function pcartDel(i){pcart.splice(i,1);renderPcart();}
function checkoutPurchase(){
  if(!pcart.length){toast('لا مواد في الفاتورة','err');return;}
  const total=pcart.reduce((a,l)=>a+l.cost*l.qty,0);
  let paid=parseFloat(val('ppaidAmt'));if(isNaN(paid))paid=total;
  const remaining=Math.max(0,total-paid);
  const supId=document.getElementById('purchSupplier').value;
  const sup=DB.suppliers.find(s=>s.id===supId);if(!sup){toast('اختر المورد','err');return;}
  // تحديث المخزون وسعر الجملة
  pcart.forEach(l=>{const p=DB.products.find(x=>x.id===l.id);if(p){p.qty+=l.qty;p.wholesale=l.cost;}});
  const no=DB.seq.purchase++;
  const purch={id:uid('pur'),no,date:new Date().toISOString(),supplierId:supId,supplierName:sup.name,
    items:pcart.map(l=>({name:l.name,cost:l.cost,qty:l.qty})),total,paid:Math.min(paid,total),remaining};
  DB.purchases.push(purch);
  sup.balance+=remaining;
  if(Math.min(paid,total)>0)addCash('out',Math.min(paid,total),'فاتورة شراء #'+no+' - '+sup.name,purch.id);
  save();pcart=[];
  toast('تم حفظ فاتورة الشراء #'+no,'ok');
  go('purchase');
}

    actions:[
      c.balance>0?{label:'تسجيل دفعة',primary:true,fn:()=>{collectPayment(id);return true;}}:null,
      {label:'طباعة',icon:I.print,fn:()=>{printEl('stmt');return false;}},
      {label:'إغلاق',fn:()=>true}

function collectPayment(id){

function importCSV(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.csv,.txt';
  inp.onchange=()=>{const f=inp.files[0];if(!f)return;const r=new FileReader();
    r.onload=()=>{
      const lines=r.result.split(/\r?\n/).filter(l=>l.trim());
      let added=0;
      // تخطّي صف العناوين إن وُجد
      const start=/[a-zA-Zأ-ي]/.test(lines[0])&&!/^\d/.test(lines[0].split(/[,;\t]/)[3]||'')?1:0;
      for(let i=start;i<lines.length;i++){
        const c=lines[i].split(/[,;\t]/).map(x=>x.trim());
        if(!c[0])continue;
        DB.products.push({id:uid('p'),name:c[0],code:c[1]||'',category:c[2]||DB.categories[0],
          price:parseFloat(c[3])||0,wholesale:parseFloat(c[4])||0,qty:parseFloat(c[5])||0,minQty:parseFloat(c[6])||5,desc:c[7]||''});
        if(c[2]&&!DB.categories.includes(c[2]))DB.categories.push(c[2]);
        added++;
      }
      save();toast(`تم استيراد ${added} منتج`,'ok');render();
    };r.readAsText(f,'UTF-8');};
  inp.click();
}

/* --- باركود Code128 --- */
const BC_PAT=["212222","222122","222221","121223","121322","131222","122213","122312","132212","221213","221312","231212","112232","122132","122231","113222","123122","123221","223211","221132","221231","213212","223112","312131","311222","321122","321221","312212","322112","322211","212123","212321","232121","111323","131123","131321","112313","132113","132311","211313","231113","231311","112133","112331","132131","113123","113321","133121","313121","211331","231131","213113","213311","213131","311123","311321","331121","312113","312311","332111","314111","221411","431111","111224","111422","121124","121421","141122","141221","112214","112412","122114","122411","142112","142211","241211","221114","413111","241112","134111","111242","121142","121241","114212","124112","124211","411212","421112","421211","212141","214121","412121","111143","111341","131141","114113","114311","411113","411311","113141","114131","311141","411131","211412","211214","211232","2331112"];
function code128widths(text){
  text=String(text).replace(/[^\x20-\x7e]/g,'');if(!text)return'';
  let codes=[104];for(const ch of text)codes.push(ch.charCodeAt(0)-32);
  let sum=104;for(let i=1;i<codes.length;i++)sum+=codes[i]*i;
  codes.push(sum%103);codes.push(106);
  return codes.map(c=>BC_PAT[c]).join('');
}
function barcodeSVG(text,h){
  const w=code128widths(text);if(!w)return'';h=h||52;const unit=2;let x=0,rects='';
  for(let i=0;i<w.length;i++){const wd=+w[i]*unit;if(i%2===0)rects+=`<rect x="${x}" y="0" width="${wd}" height="${h}" fill="#111"/>`;x+=wd;}
  return `<svg width="${x}" height="${h}" viewBox="0 0 ${x} ${h}" xmlns="http://www.w3.org/2000/svg" style="max-width:100%">${rects}</svg>`;
}
function printLabel(id){

/* --- صور المنتجات (تصغير تلقائي) --- */
function downscaleImage(file,cb){
  const r=new FileReader();
  r.onload=()=>{const img=new Image();img.onload=()=>{
    const max=440;let wd=img.width,ht=img.height;
    if(wd>ht&&wd>max){ht=ht*max/wd;wd=max;}else if(ht>max){wd=wd*max/ht;ht=max;}
    const c=document.createElement('canvas');c.width=wd;c.height=ht;
    c.getContext('2d').drawImage(img,0,0,wd,ht);
    cb(c.toDataURL('image/jpeg',0.72));
  };img.onerror=()=>cb(null);img.src=r.result;};

}

/* --- مسح الباركود بالكاميرا --- */
let _scanStream=null,_scanCb=null;
function scanBarcode(onFound){
  const supported=('BarcodeDetector' in window);
  _scanCb=onFound;
  modal({title:'مسح الباركود',body:`
    ${supported?`<div style="background:#000;border-radius:14px;overflow:hidden;aspect-ratio:4/3;display:grid;place-items:center">
      <video id="scanVid" playsinline style="width:100%;height:100%;object-fit:cover"></video></div>
      <p class="muted" style="text-align:center;margin-top:10px;font-size:13px">وجّه الكاميرا نحو الباركود</p>`
      :`<p class="muted" style="font-size:13.5px;margin-bottom:12px">المسح بالكاميرا غير مدعوم هنا (يتطلب كروم على أندرويد وعبر رابط آمن). أدخل الكود يدوياً:</p>`}
    <div class="field" style="margin-top:10px"><label>أو أدخل الكود يدوياً</label>
      <input class="inp" id="scanManual" placeholder="اكتب كود المنتج" onkeydown="if(event.key==='Enter'){_scanDone(this.value)}"></div>`,
    actions:[{label:'بحث',primary:true,fn:()=>{const v=val('scanManual').trim();if(v)_scanDone(v);return false;}},{label:'إغلاق',fn:()=>{_scanStop();return true;}}]});
  if(supported)_scanStart();
}
async function _scanStart(){
  try{
    const det=new window.BarcodeDetector();
    _scanStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const v=document.getElementById('scanVid');if(!v){_scanStop();return;}
    v.srcObject=_scanStream;await v.play();
    const tick=async()=>{
      if(!_scanStream)return;
      try{const codes=await det.detect(v);if(codes&&codes.length){_scanDone(codes[0].rawValue);return;}}catch(e){}
      requestAnimationFrame(tick);
    };requestAnimationFrame(tick);
  }catch(e){toast('تعذّر فتح الكاميرا — أدخل الكود يدوياً','err');}
}
function _scanStop(){if(_scanStream){_scanStream.getTracks().forEach(t=>t.stop());_scanStream=null;}}
function _scanDone(code){_scanStop();closeModal();const cb=_scanCb;_scanCb=null;if(cb&&code)cb(String(code).trim());}

/* --- البحث البصري بالذكاء الاصطناعي (MobileNet) --- */
let _mnet=null,_embCache={};
function _loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('load'));document.head.appendChild(s);});}
async function ensureVisionModel(){
  if(_mnet)return _mnet;
  if(typeof tf==='undefined')await _loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4');
  if(typeof mobilenet==='undefined')await _loadScript('https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2');
  _mnet=await mobilenet.load({version:2,alpha:1.0});
  return _mnet;
}
function _imgFrom(src){return new Promise((res,rej)=>{const i=new Image();i.onload=()=>res(i);i.onerror=rej;i.src=src;});}
async function _embed(src){
  const img=await _imgFrom(src);
  const t=tf.tidy(()=>_mnet.infer(img,true));
  const d=await t.data();t.dispose();return Float32Array.from(d);
}
function _cosine(a,b){let d=0,na=0,nb=0;for(let i=0;i<a.length;i++){d+=a[i]*b[i];na+=a[i]*a[i];nb+=b[i]*b[i];}return d/(Math.sqrt(na)*Math.sqrt(nb)+1e-8);}
async function _rankByImage(querySrc,onProg){
  await ensureVisionModel();
  const q=await _embed(querySrc);
  const withImg=DB.products.filter(p=>p.image);
  const res=[];
  for(let i=0;i<withImg.length;i++){
    const p=withImg[i];let c=_embCache[p.id];
    if(!c||c.sig!==p.image.length){c={sig:p.image.length,emb:await _embed(p.image)};_embCache[p.id]=c;}
    res.push({p,score:_cosine(q,c.emb)});
    onProg&&onProg(i+1,withImg.length);
  }
  res.sort((a,b)=>b.score-a.score);return res;
}
let _aiCtx='store';
function openImageSearch(ctx){
  _aiCtx=ctx||'store';

  modal({title:'البحث بصورة (ذكاء اصطناعي)',size:'lg',body:`

  `,actions:[{label:'إغلاق',fn:()=>true}]});
}
function aiImagePick(input){
  const f=input.files[0];if(!f)return;
  downscaleImage(f,async uri=>{
    if(!uri){toast('تعذّر قراءة الصورة','err');return;}
    const pick=document.getElementById('aiPick');if(pick)pick.style.display='none';
    document.getElementById('aiQuery').innerHTML=`<div style="text-align:center;margin:6px 0 14px">

    try{
      const ranked=await _rankByImage(uri,(i,n)=>{const t=document.getElementById('aiProgTxt');if(t)t.textContent=`مطابقة ${i} من ${n}`;});
      renderAIResults(ranked.slice(0,8));
    }catch(e){
      r.innerHTML=`<div class="empty">${svg(I.alert,40)}<b>تعذّر تشغيل البحث البصري</b>يتطلب اتصال إنترنت لتحميل نموذج الذكاء الاصطناعي. تأكد من الاتصال وحاول مجدداً.</div>`;
    }
    input.value='';
  });
}
function renderAIResults(list){

}

let LANG=DB.settings.lang||'ar';
function t(k){return (L[LANG]&&L[LANG][k])||L.ar[k]||k;}
function catLabel(c){return LANG==='fr'?(CAT_FR[c]||c):c;}
function applyLang(){
  document.documentElement.lang=LANG;
  document.documentElement.dir=LANG==='fr'?'ltr':'rtl';
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=t(el.getAttribute('data-i18n'));});
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{el.placeholder=t(el.getAttribute('data-i18n-ph'));});
  const lb=document.getElementById('langBtn');if(lb)lb.textContent=LANG==='fr'?'ع':'FR';
  const mn=document.querySelector('.menu-name');if(mn)mn.textContent=DB.settings.guestName||t('menuGuest');
  renderStore();
  if(!window._welcomed){window._welcomed=true;setTimeout(()=>toast(greetMsg()),500);}
}
function greetMsg(){const n=DB.settings.guestName;return n?`${t('hello')} ${n}`:t('helloGuest');}
function setGuestName(){
  modal({title:t('yourName'),body:`
    <p class="muted" style="margin-bottom:12px;font-size:13.5px">${t('nameHint')}</p>
    <div class="field"><label>${t('yourName')}</label><input class="inp" id="gn" value="${esc(DB.settings.guestName||'')}" placeholder="${t('namePh')}"></div>`,
    actions:[{label:t('save'),primary:true,fn:()=>{
      DB.settings.guestName=val('gn').trim();save();
      const mn=document.querySelector('.menu-name');if(mn)mn.textContent=DB.settings.guestName||t('menuGuest');
      if(DB.settings.guestName)toast(greetMsg(),'ok');return true;
    }},{label:t('close'),fn:()=>true}]});
}
function toggleLang(){LANG=LANG==='fr'?'ar':'fr';DB.settings.lang=LANG;save();applyLang();}

let _rec=null;
function startVoiceSearch(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast(t('voiceNo'),'err');return;}
  const mic=document.getElementById('micBtn');
  try{
    _rec=new SR();_rec.lang=LANG==='fr'?'fr-FR':'ar-SA';_rec.interimResults=false;_rec.maxAlternatives=1;
    if(mic)mic.classList.add('rec');toast(t('listening'));
    _rec.onresult=e=>{const txt=e.results[0][0].transcript;const inp=document.getElementById('storeQ');
      if(inp){inp.value=txt;renderStoreGrid();scrollToProducts();}};
    _rec.onerror=()=>{if(mic)mic.classList.remove('rec');};
    _rec.onend=()=>{if(mic)mic.classList.remove('rec');};
    _rec.start();
  }catch(err){if(mic)mic.classList.remove('rec');toast(t('voiceNo'),'err');}
}

let storeCat='';

function showStore(){
  document.getElementById('adminUI').classList.add('hidden');
  document.getElementById('storefront').classList.remove('hidden');
  document.getElementById('storeNav').classList.remove('hidden');
  applyDark();applyLang();window.scrollTo(0,0);
}
function showAdmin(){
  if(!CUR_USER){adminLogin();return;}
  document.getElementById('storefront').classList.add('hidden');
  document.getElementById('storeNav').classList.add('hidden');
  closeCart();
  document.documentElement.classList.remove('dark');
  document.documentElement.dir='rtl';document.documentElement.lang='ar';
  document.getElementById('adminUI').classList.remove('hidden');
  const rb=document.getElementById('roleBadge');if(rb)rb.textContent=`${CUR_USER.name} · ${CUR_USER.role}`;
  buildNav();
  go(allowedPages()[0]||'dash');
  window.scrollTo(0,0);
}
function renderStore(){
  _topSellers=null;
  const l=document.getElementById('sfLogo');if(l)l.style.backgroundImage=`url(${LOGO})`;
  renderCats();renderDeals();renderCatTabs();renderStoreGrid();renderFooter();updateCartBadge();
}
function renderCats(){
  const el=document.getElementById('catRow');if(!el)return;
  const all=`<button class="cat-item" onclick="storeCat='';renderCats();renderCatTabs();renderStoreGrid();scrollToProducts()">
    <span class="cat-tile ${storeCat===''?'on':''}">${svg(I.store,26)}</span><span class="cat-label">${t('all')}</span></button>`;
  el.innerHTML=all+DB.categories.map(c=>`
    <button class="cat-item" onclick="storeCat='${esc(c)}';renderCats();renderCatTabs();renderStoreGrid();scrollToProducts()">
      <span class="cat-tile ${storeCat===c?'on':''}">${svg(CAT_ICONS[c]||I.box,26)}</span>
      <span class="cat-label">${esc(catLabel(c))}</span>
    </button>`).join('');
}
function renderCatTabs(){
  const el=document.getElementById('catTabs');if(!el)return;
  const tab=(c,label)=>`<button class="cat-tab ${storeCat===c?'on':''}" onclick="storeCat='${esc(c)}';renderCatTabs();renderCats();renderStoreGrid()">${esc(label)}</button>`;
  el.innerHTML=tab('',t('all'))+DB.categories.map(c=>tab(c,catLabel(c))).join('');
}
function renderDeals(){
  const el=document.getElementById('dealRow');if(!el)return;
  const instock=DB.products.filter(p=>p.qty>0);
  const list=instock.slice().sort((a,b)=>discPct(b)-discPct(a)).slice(0,10);
  if(!list.length){document.getElementById('dealsSec').style.display='none';return;}
  document.getElementById('dealsSec').style.display='';
  el.innerHTML=list.map(p=>{const dp=discPct(p);const img=prodImg(p);return`
    <div class="deal-card" style="cursor:pointer" onclick="openProductDetail('${p.id}')">
      <div class="deal-img" ${img?`style="background-image:url(${img})"`:''}>${img?'':svg(I.box,30)}
        <span class="deal-price">${money(p.price)} ${CUR()}</span>${dp?`<span class="disc-badge">-${dp}%</span>`:''}</div>
      <div class="deal-info"><div class="deal-name">${esc(p.name)}</div><div class="deal-tag">${dp?'-'+dp+'% '+t('off'):t('bestPrice')}</div></div>
    </div>`;}).join('');
}

function cardCtrl(p,out){
  if(out)return `<button class="prod-add" disabled>${svg(I.plus,16)}</button>`;
  const q=cartQtyOf(p.id);
  if(q>0)return `<div class="card-step" onclick="event.stopPropagation()"><button onclick="stepCart('${p.id}',-1)">−</button><b>${q}</b><button onclick="stepCart('${p.id}',1)">+</button></div>`;
  return `<button class="prod-add" onclick="event.stopPropagation();addToCartStore('${p.id}')" aria-label="add">${svg(I.plus,16)}</button>`;
}
function renderStoreGrid(){
  const el=document.getElementById('storeGrid');if(!el)return;
  const q=(document.getElementById('storeQ')?.value||'').trim().toLowerCase();
  document.getElementById('prodSecTitle').textContent=storeCat?catLabel(storeCat):t('allProducts');
  let list=DB.products.filter(p=>{
    if(storeCat&&p.category!==storeCat)return false;
    if(q&&!(p.name.toLowerCase().includes(q)||(p.code||'').toLowerCase().includes(q)))return false;
    return true;
  });
  if(!list.length){el.innerHTML=`<div class="empty" style="grid-column:1/-1">${svg(I.box,42)}<b>${t('noProducts')}</b></div>`;return;}
  el.innerHTML=list.map(p=>{const out=p.qty<=0;const dp=discPct(p);const tag=productTag(p);const img=prodImg(p);return`
    <div class="prod-card" style="cursor:pointer" onclick="openProductDetail('${p.id}')">
      <div class="prod-img" ${img?`style="background-image:url(${img})"`:''}>${img?'':svg(I.box,30)}
        <span class="prod-badge">${money(p.price)} ${CUR()}</span>
        ${out?`<span class="prod-out">${t('out')}</span>`:(tag?`<span class="ptag ${tag.cls}">${tag.text}</span>`:'')}
        ${dp?`<span class="disc-badge">-${dp}%</span>`:''}
        <button class="fav-btn ${isFav(p.id)?'on':''}" onclick="event.stopPropagation();favToggle('${p.id}')" aria-label="fav">${svg(I.heart,17)}</button></div>
      <div class="prod-info">
        <div class="prod-cat">${esc(catLabel(p.category))}</div>
        <div class="prod-name">${esc(p.name)}</div>
        <div class="prod-foot">
          <div class="prod-price">${money(p.price)} <small>${CUR()}</small>${dp?`<s class="old-price">${money(p.oldPrice)}</s>`:''}</div>
          ${cardCtrl(p,out)}
        </div>
      </div>
    </div>`;}).join('');
}
function stepCart(id,d){
  const p=DB.products.find(x=>x.id===id);
  const line=CART.find(c=>c.id===id);
  if(line){line.qty+=d;if(line.qty<=0)CART.splice(CART.indexOf(line),1);}
  else if(d>0&&p)CART.push({id,name:p.name,price:p.price,qty:1});
  saveCart();updateCartBadge();renderStoreGrid();renderDeals();
  const cd=document.getElementById('cartDrawer');if(cd&&cd.classList.contains('open'))renderStoreCart();
}
function favToggle(id){toggleFav(id);renderStoreGrid();renderDeals();
  const fb=document.getElementById('pdFav');if(fb)fb.classList.toggle('on',isFav(id));}
function payIcon(name){
  const n=name.toLowerCase();
  if(/نقد|cash/.test(n))return I.wallet;
  if(/بطاقة|visa|master|فيزا|ماستر|card/.test(n))return I.card;
  if(/تحويل|حوالة|transfer/.test(n))return I.transfer;
  return I.wallet;
}
