function addToCartStore(id,qty){
  qty=qty||1;
  const p=DB.products.find(x=>x.id===id);if(!p)return;
  const line=CART.find(c=>c.id===id);
  if(line)line.qty+=qty;else CART.push({id,name:p.name,price:p.price,qty});
  saveCart();updateCartBadge();toast(t('addedCart'),'ok');
  if(document.getElementById('storeGrid'))renderStoreGrid();
  if(document.getElementById('dealRow'))renderDeals();
}
let _pdId=null,_pdQty=1;
function pdSetImg(src){const m=document.getElementById('pdMain');if(m)m.style.backgroundImage=`url(${src})`;
  document.querySelectorAll('#modalRoot .pd-thumb').forEach(t=>t.classList.toggle('on',t.dataset.src===src));}
function openProductDetail(id){
  const p=DB.products.find(x=>x.id===id);if(!p)return;
  _pdId=id;_pdQty=1;const out=p.qty<=0;
  const stTxt=out?t('out'):(p.qty<=p.minQty?t('tagLimited'):t('inStock'));
  const imgs=prodImgs(p);const main=imgs[0]||'';
  const related=DB.products.filter(x=>x.category===p.category&&x.id!==p.id).slice(0,8);
  modal({title:t('details'),size:'lg',body:`
    <div class="pd-gallery">
      <div class="pd-main" id="pdMain" ${main?`style="background-image:url(${main})"`:''}>${main?'':svg(I.box,54)}</div>
      <button class="fav-btn ${isFav(p.id)?'on':''}" id="pdFav" style="bottom:auto;top:10px;inset-inline-end:10px" onclick="favToggle('${p.id}')">${svg(I.heart,18)}</button>
      ${imgs.length>1?`<div class="pd-thumbs">${imgs.map((s,i)=>`<div class="pd-thumb ${i===0?'on':''}" data-src="${s}" style="background-image:url(${s})" onclick="pdSetImg('${s}')"></div>`).join('')}</div>`:''}
    </div>
    <div class="prod-cat" style="font-size:12.5px;margin-top:12px">${esc(catLabel(p.category))}</div>
    <h3 style="font-size:19px;font-weight:800;margin:3px 0 8px">${esc(p.name)}</h3>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font-size:21px;font-weight:800;color:var(--primary-d)">${money(p.price)} ${CUR()}</span>
      ${discPct(p)?`<s style="color:#94A3B8;font-weight:600;font-size:15px">${money(p.oldPrice)} ${CUR()}</s><span class="badge" style="background:#FCE7EE;color:#E11D48">-${discPct(p)}% ${t('off')}</span>`:''}
      <span class="badge ${out?'b-out':'b-ok'}">${stTxt}</span>
      ${p.code?`<span class="code-tag">${esc(p.code)}</span>`:''}
    </div>
    <div style="margin-top:12px;font-size:14px;line-height:1.85;color:var(--muted);white-space:pre-wrap">${esc(p.desc||t('noDesc'))}</div>
    ${out?'':`<div style="display:flex;align-items:center;gap:14px;margin-top:16px">
      <span style="font-weight:700;font-size:14px">${t('quantity')}</span>
      <div class="qty-ctrl"><button onclick="pdQty(-1)">−</button><b id="pdQtyVal" class="t-num" style="min-width:24px;text-align:center">1</b><button onclick="pdQty(1)">+</button></div>
    </div>`}
    ${related.length?`<div style="margin-top:20px"><div style="font-weight:800;font-size:15px;margin-bottom:10px">${t('related')}</div>
      <div class="deal-row" style="padding:0 0 4px">${related.map(r=>{const ri=prodImg(r);return`<div class="deal-card" style="cursor:pointer;width:130px" onclick="closeModal();setTimeout(()=>openProductDetail('${r.id}'),60)">
        <div class="deal-img" style="height:100px${ri?`;background-image:url(${ri})`:''}">${ri?'':svg(I.box,26)}<span class="deal-price">${money(r.price)} ${CUR()}</span></div>
        <div class="deal-info"><div class="deal-name" style="height:auto">${esc(r.name)}</div></div></div>`;}).join('')}</div></div>`:''}`,
    actions:[
      out?null:{label:t('addCart'),primary:true,icon:I.plus,fn:()=>{addToCartStore(_pdId,_pdQty);return true;}},
      {label:t('close'),fn:()=>true}
    ].filter(Boolean)});
}
function pdQty(d){const p=DB.products.find(x=>x.id===_pdId);const max=p?p.qty:99;
  _pdQty=Math.max(1,Math.min(max,_pdQty+d));const e=document.getElementById('pdQtyVal');if(e)e.textContent=_pdQty;}
function updateCartBadge(){
  const n=CART.reduce((a,c)=>a+c.qty,0);
  ['cartCount','cartCountHero'].forEach(id=>{const b=document.getElementById(id);if(b){b.textContent=n;b.style.display=n?'grid':'none';}});
}
function openCart(){renderStoreCart();document.getElementById('cartDrawer').classList.add('open');}
function closeCart(){document.getElementById('cartDrawer').classList.remove('open');}
function renderStoreCart(){
  const items=document.getElementById('cartItems');const foot=document.getElementById('cartFoot');
  const head=document.querySelector('#cartDrawer .cart-head span');if(head)head.textContent=t('cartTitle');
  if(!CART.length){
    const reco=DB.products.filter(p=>p.qty>0).slice(0,4);
    items.innerHTML=`<div class="empty" style="padding:26px 10px">${svg(I.store,42)}<b>${t('cartEmpty')}</b>${t('cartEmptySub')}</div>
      ${reco.length?`<div style="padding:4px 16px 8px"><div style="font-weight:800;font-size:14px;margin-bottom:10px">${t('recoTitle')}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${reco.map(p=>{const img=prodImg(p);return`
          <div class="prod-card" style="cursor:pointer" onclick="closeCart();setTimeout(()=>openProductDetail('${p.id}'),80)">
            <div class="prod-img" style="height:96px${img?`;background-image:url(${img})`:''}">${img?'':svg(I.box,26)}<span class="prod-badge">${money(p.price)} ${CUR()}</span></div>
            <div class="prod-info" style="padding:8px 10px 10px"><div class="prod-name" style="font-size:12px">${esc(p.name)}</div></div>
          </div>`;}).join('')}</div></div>`:''}`;
    foot.innerHTML='';return;
  }
  items.innerHTML=CART.map((l,i)=>`<div class="cart-row">
    <div style="flex:1"><b style="font-size:14px">${esc(l.name)}</b><div class="muted" style="font-size:12.5px">${m(l.price)}</div></div>
    <div class="qty-ctrl">
      <button onclick="cartStoreQty(${i},-1)">−</button>
      <b class="t-num" style="min-width:20px;text-align:center">${l.qty}</b>
      <button onclick="cartStoreQty(${i},1)">+</button>
    </div></div>`).join('');
  const total=CART.reduce((a,l)=>a+l.price*l.qty,0);
  foot.innerHTML=`
    <div style="display:flex;justify-content:space-between;font-size:18px;font-weight:800;margin-bottom:14px">
      <span>${t('total')}</span><span class="t-num">${m(total)}</span></div>
    <button class="store-cta" style="background:#25D366" onclick="checkoutWhatsApp()">${t('checkoutWa')}</button>
    <button class="btn btn-ghost" style="width:100%;justify-content:center;margin-top:8px" onclick="CART=[];saveCart();renderStoreCart();updateCartBadge();renderStoreGrid();renderDeals()">${t('clearCart')}</button>`;
}
function cartStoreQty(i,d){const l=CART[i];l.qty+=d;if(l.qty<=0)CART.splice(i,1);saveCart();renderStoreCart();updateCartBadge();renderStoreGrid();renderDeals();}

/* ---- إتمام الطلب (نموذج البيع) ---- */
let _coords=null,_payProof=null;
function checkoutWhatsApp(){
  if(!CART.length)return;
  const num=(DB.settings.whatsapp||'').replace(/[^0-9]/g,'');
  if(!num){toast(t('waNotSet'),'err');return;}
  openCheckout(num);
}
function openCheckout(num){
  _coords=null;_payProof=null;
  const pays=(DB.settings.payments||[]).filter(Boolean);
  const total=CART.reduce((a,l)=>a+l.price*l.qty,0);
  modal({title:t('checkoutTitle'),size:'lg',body:`
    <div style="background:var(--primary-soft);color:var(--primary-d);border-radius:12px;padding:11px 14px;margin-bottom:14px;display:flex;justify-content:space-between;font-weight:800;font-size:15px">
      <span>${t('total')}</span><span>${money(total)} ${CUR()}</span></div>
    <div class="grid2">
      <div class="field"><label>${t('coName')} *</label><input class="inp" id="co_name" value="${esc(DB.settings.guestName||'')}"></div>
      <div class="field"><label>${t('coPhone')} *</label><input class="inp" id="co_phone" type="tel" inputmode="tel" placeholder="06 / 07 ..."></div>
    </div>
    <div class="field"><label>${t('coAddr')}</label><input class="inp" id="co_addr"></div>
    <div class="field"><label>${t('coPay')}</label><select class="inp" id="co_pay">${pays.length?pays.map(p=>`<option>${esc(p)}</option>`).join(''):`<option>${t('coPayDef')}</option>`}</select></div>
    <div class="field"><label>${t('coLoc')}</label>
      <button type="button" class="btn" id="co_locBtn" style="width:100%;justify-content:center" onclick="getCheckoutLocation()">${svg(I.store,16)} <span id="co_locTxt">${t('coLocBtn')}</span></button>
      <div id="co_locMsg" style="font-size:12.5px;margin-top:6px;color:var(--muted)"></div>
    </div>
    <div class="field"><label>${t('coProof')}</label>
      <div id="co_proofPrev" onclick="document.getElementById('co_proof').click()" style="height:92px;border:1px dashed var(--line);border-radius:12px;display:grid;place-items:center;color:var(--muted);font-size:12.5px;cursor:pointer;background:#f8fafc center/cover no-repeat">${svg(I.upload,18)} <span style="margin-inline-start:6px">${t('coProofBtn')}</span></div>
      <input type="file" id="co_proof" accept="image/*" class="hidden" onchange="pickPayProof(this)">
    </div>
    <div class="field"><label>${t('coNote')}</label><textarea class="inp" id="co_note" style="min-height:60px"></textarea></div>
  `,actions:[
    {label:t('coSend'),primary:true,fn:()=>submitCheckout(num,total)},
    {label:t('close'),fn:()=>true}
  ]});
  setTimeout(getCheckoutLocation,300);
}
function getCheckoutLocation(){
  const msg=document.getElementById('co_locMsg');
  if(!navigator.geolocation){if(msg)msg.textContent=t('coLocErr');return;}
  if(msg)msg.textContent=t('coLocWait');
  navigator.geolocation.getCurrentPosition(
    pos=>{_coords={lat:pos.coords.latitude.toFixed(6),lng:pos.coords.longitude.toFixed(6)};
      const link=`https://maps.google.com/?q=${_coords.lat},${_coords.lng}`;
      if(msg)msg.innerHTML=`<span style="color:var(--success);font-weight:700">✓ ${t('coLocOk')}</span> · <a href="${link}" target="_blank" style="color:var(--primary);font-weight:700">${t('coView')}</a>`;
      const bt=document.getElementById('co_locTxt');if(bt)bt.textContent=t('coLocOk');},
    err=>{if(msg)msg.textContent=t('coLocErr');},
    {enableHighAccuracy:true,timeout:10000,maximumAge:60000});
}
function pickPayProof(input){
  const f=input.files[0];if(!f)return;
  downscaleImage(f,uri=>{if(!uri){toast('تعذّر قراءة الصورة','err');return;}
    _payProof=uri;const pv=document.getElementById('co_proofPrev');
    if(pv){pv.style.backgroundImage=`url(${uri})`;pv.innerHTML='';}});
  input.value='';
}
function submitCheckout(num,total){
  const name=(val('co_name')||'').trim();const phone=(val('co_phone')||'').trim();
  if(!name||!phone){toast(t('coNeed'),'err');return false;}
  const addr=(val('co_addr')||'').trim();const pay=val('co_pay')||'';const note=(val('co_note')||'').trim();
  let txt='*'+t('orderMsg')+'*\n\n';
  txt+=`*${t('coCustomer')}:* ${name}\n*${t('coPhone')}:* ${phone}\n`;
  if(addr)txt+=`*${t('coAddr')}:* ${addr}\n`;
  if(pay)txt+=`*${t('coPay')}:* ${pay}\n`;
  txt+=`\n*${t('coItems')}:*\n`;
  CART.forEach(l=>{txt+=`• ${l.name} — ${l.qty} × ${money(l.price)} = ${money(l.price*l.qty)} ${CUR()}\n`;});
  txt+=`\n*${t('orderTotal')}: ${money(total)} ${CUR()}*\n`;
  if(_coords)txt+=`\n*${t('coLocLabel')}:* https://maps.google.com/?q=${_coords.lat},${_coords.lng}\n`;
  if(note)txt+=`\n*${t('coNote')}:* ${note}\n`;
  if(_payProof)txt+=`\n${t('coProofNote')}\n`;
  const sendLink=()=>window.open(`https://wa.me/${num}?text=${encodeURIComponent(txt)}`,'_blank');
  if(_payProof&&navigator.canShare){
    fetch(_payProof).then(r=>r.blob()).then(blob=>{
      const file=new File([blob],'payment.jpg',{type:blob.type||'image/jpeg'});
      if(navigator.canShare({files:[file]})){navigator.share({text:txt,files:[file]}).catch(()=>sendLink());}
      else sendLink();
    }).catch(()=>sendLink());
  }else sendLink();
  toast(t('coReady'),'ok');
  return true;
}
function openWhatsApp(){
  const num=(DB.settings.whatsapp||'').replace(/[^0-9]/g,'');
  if(!num){toast(t('waNotSet'),'err');return;}
  window.open(`https://wa.me/${num}`,'_blank');
}

/* ---- القائمة المنسدلة ---- */
function openStoreMenu(){
  const a=document.getElementById('menuAva');if(a)a.style.backgroundImage=`url(${LOGO})`;
  const mn=document.querySelector('.menu-name');
  if(mn)mn.textContent=DB.settings.guestName?`${t('hello')} ${DB.settings.guestName}`:t('menuGuest');
  document.getElementById('storeMenu').classList.add('open');
}
function openFavorites(){
  const favs=DB.fav.map(id=>DB.products.find(p=>p.id===id)).filter(Boolean);
  const body=favs.length?`<div style="display:flex;flex-direction:column;gap:10px">${favs.map(p=>{const img=prodImg(p);return`
    <div style="display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:14px;padding:10px">
      <div style="width:54px;height:54px;border-radius:11px;flex:0 0 auto;background:linear-gradient(135deg,#EEF3FF,#DDF6FB) center/cover no-repeat;${img?`background-image:url(${img})`:''};display:grid;place-items:center" onclick="closeModal();setTimeout(()=>openProductDetail('${p.id}'),60)">${img?'':svg(I.box,22)}</div>
      <div style="flex:1" onclick="closeModal();setTimeout(()=>openProductDetail('${p.id}'),60)"><b style="font-size:14px">${esc(p.name)}</b><div class="prod-price" style="font-size:14px">${money(p.price)} ${CUR()}</div></div>
      <button class="prod-add" ${p.qty<=0?'disabled':''} onclick="addToCartStore('${p.id}')">${svg(I.plus,16)}</button>
      <button class="btn btn-sm btn-ghost" onclick="favToggle('${p.id}');openFavorites()">${svg(I.heart,15)}</button>
    </div>`;}).join('')}</div>`
    :`<div class="empty" style="padding:30px 10px">${svg(I.heart,42)}<b>${t('favEmpty')}</b></div>`;
  modal({title:t('favorites'),body,actions:[{label:t('close'),fn:()=>true}]});
}
function applyDark(){
  const on=!!DB.settings.dark;
  document.documentElement.classList.toggle('dark',on);
  const di=document.getElementById('darkIcon');
  if(di)di.innerHTML=svg(on?I.sun:I.moon,18);
}
function toggleDark(){DB.settings.dark=!DB.settings.dark;save();applyDark();
  toast(DB.settings.dark?t('darkOn'):t('darkOff'),'ok');}
function closeStoreMenu(){document.getElementById('storeMenu').classList.remove('open');}
function showAbout(){
  const txt=DB.settings.about||t('aboutDef');
  modal({title:t('mAbout'),body:`<div style="text-align:center;margin-bottom:14px"><div id="aboutLogo" style="width:72px;height:72px;margin:0 auto 10px;border-radius:50%;background:#fff center/contain no-repeat;border:1px solid var(--line)"></div></div>
    <p style="font-size:14.5px;line-height:1.9;white-space:pre-wrap">${esc(txt)}</p>`,
    actions:[{label:t('contactWa'),primary:true,fn:()=>{openWhatsApp();return true;}},{label:t('close'),fn:()=>true}]});
  setTimeout(()=>{const l=document.getElementById('aboutLogo');if(l)l.style.backgroundImage=`url(${LOGO})`;},20);
}
function showTerms(){
  const txt=DB.settings.terms||t('termsDef');
  modal({title:t('mTerms'),body:`<p style="font-size:14.5px;line-height:2;white-space:pre-wrap">${esc(txt)}</p>`,
    actions:[{label:t('ok'),primary:true,fn:()=>true}]});
}

/* ---- دخول المدير ---- */
const ROLE_LIST=['صاحب','مدير','محاسب','مسيّر'];
function roleColor(r){return {'صاحب':'#7c3aed','مدير':'#1D4ED8','محاسب':'#0891b2','مسيّر':'#16a34a'}[r]||'#64748b';}
function vUsers(v){
  if(!CUR_USER||CUR_USER.role!=='صاحب'){v.innerHTML=`<div class="empty" style="padding:40px">${svg(I.people,40)}<b>غير مصرّح</b>هذا القسم خاص بالصاحب</div>`;return;}
  v.innerHTML=`<div class="panel"><div class="panel-h">${svg(I.people,18)}<h3>الموظفون (${DB.users.length})</h3>
    <button class="btn btn-primary btn-sm" style="margin-inline-start:auto" onclick="editUser()">${svg(I.plus,15)} إضافة موظف</button></div>
    <div style="padding:6px 0">
    ${DB.users.map(u=>`<div class="row-line" style="padding:12px 18px;display:flex;align-items:center;gap:8px">
       <span style="width:34px;height:34px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;background:${roleColor(u.role)}22;color:${roleColor(u.role)}">${svg(I.people,17)}</span>
       <div style="flex:1"><b>${esc(u.name)}</b><div class="muted" style="font-size:12.5px">${esc(u.username)} · <span style="color:${roleColor(u.role)};font-weight:700">${u.role}</span></div></div>
       <button class="btn btn-sm btn-icon" onclick="editUser('${u.id}')">${svg(I.edit,15)}</button>
       ${u.role==='صاحب'?'':`<button class="btn btn-sm btn-icon btn-ghost" onclick="delUser('${u.id}')">${svg(I.trash,15)}</button>`}
     </div>`).join('')}
    </div></div>
    <div class="panel" style="margin-top:14px"><div style="padding:16px;font-size:13px;line-height:1.95;color:var(--muted)">
      <b style="color:var(--ink)">الصلاحيات حسب الدور:</b><br>
      • <b style="color:#7c3aed">الصاحب</b>: كل الأقسام + إدارة الموظفين.<br>
      • <b style="color:#1D4ED8">المدير</b>: كل الأقسام عدا إدارة الموظفين.<br>
      • <b style="color:#0891b2">المحاسب</b>: لوحة التحكم، العملاء، الموردون، المصروفات، الصندوق، التقارير.<br>
      • <b style="color:#16a34a">المسيّر</b>: المتجر، المخزون، فاتورة بيع، فاتورة شراء.
    </div></div>`;
}
function editUser(id){
  const u=id?DB.users.find(x=>x.id===id):{name:'',username:'',pass:'',role:'مسيّر'};
  modal({title:id?'تعديل موظف':'موظف جديد',body:`
    <div class="field"><label>الاسم</label><input class="inp" id="u_name" value="${esc(u.name)}"></div>
    <div class="field"><label>اسم الدخول</label><input class="inp" id="u_user" value="${esc(u.username)}" placeholder="بالأحرف اللاتينية مثل staff7"></div>
    <div class="field"><label>كلمة المرور</label><input class="inp" id="u_pass" value="${esc(u.pass)}"></div>
    <div class="field"><label>الدور</label><select class="inp" id="u_role">${ROLE_LIST.map(r=>`<option ${u.role===r?'selected':''}>${r}</option>`).join('')}</select></div>`,
    actions:[{label:'حفظ',primary:true,fn:()=>{
      const name=val('u_name').trim(),us=val('u_user').trim(),pass=val('u_pass').trim(),role=val('u_role');
      if(!name||!us||!pass){toast('أكمل كل البيانات','err');return false;}
      if(DB.users.some(x=>x.username===us&&x.id!==(id||'')) ){toast('اسم الدخول مستخدم','err');return false;}
      if(id)Object.assign(u,{name,username:us,pass,role});
      else DB.users.push({id:uid('u'),name,username:us,pass,role});
      save();toast('تم الحفظ','ok');render();return true;
    }},{label:'إلغاء',fn:()=>true}]});
}
function delUser(id){
  const u=DB.users.find(x=>x.id===id);if(!u)return;
  if(u.role==='صاحب'){toast('لا يمكن حذف الصاحب','err');return;}
  if(CUR_USER&&u.id===CUR_USER.id){toast('لا يمكن حذف حسابك الحالي','err');return;}
  confirmDlg(`حذف الموظف "${esc(u.name)}"؟`,'سيفقد إمكانية الدخول.',()=>{DB.users=DB.users.filter(x=>x.id!==id);save();toast('تم الحذف','ok');render();});
}
function logout(){CUR_USER=null;showStore();toast('تم تسجيل الخروج','ok');}
function adminLogin(){
  modal({title:'تسجيل الدخول',body:`
    <p class="muted" style="margin-bottom:14px;font-size:13.5px">أدخل اسم الدخول وكلمة المرور الخاصة بك.</p>
    <div class="field"><label>اسم الدخول</label><input class="inp" id="adm_user" placeholder="owner / manager / staff1..." autocapitalize="off" autocomplete="off"></div>
    <div class="field"><label>كلمة المرور</label><input class="inp" id="adm_pass" type="password" placeholder="••••••" onkeydown="if(event.key==='Enter')document.getElementById('admGoBtn').click()"></div>`,
    actions:[
      {label:'دخول',primary:true,fn:()=>{
        const us=(val('adm_user')||'').trim();const pass=val('adm_pass')||'';
        const u=DB.users.find(x=>x.username===us&&x.pass===pass);
        if(u){CUR_USER=u;toast('مرحباً '+u.name,'ok');showAdmin();return true;}
        toast('بيانات الدخول غير صحيحة','err');return false;
      }},
      {label:'إلغاء',fn:()=>true}
    ]});
  setTimeout(()=>{const b=document.querySelectorAll('#modalActions .btn')[0];if(b)b.id='admGoBtn';},30);
}

/* ====================== تشغيل ====================== */
buildNav();
if(!DB.settings.brands)DB.settings.brands=['INGCO','Total','Stanley','Bosch','دباس'];
if(DB.settings.adminPass===undefined)DB.settings.adminPass='admin';
setLogos();
setFavicon();
CART=loadCart();
applyDark();
window.addEventListener('scroll',()=>{const b=document.getElementById('toTop');if(b)b.classList.toggle('show',window.scrollY>500);});
showStore();
</script>
