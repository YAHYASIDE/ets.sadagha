<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>مؤسسة الصداقة للتجارة العامة — نظام الإدارة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F1F7FB; --surface:#FFFFFF; --ink:#16242E; --muted:#5B6B76;
  --line:#E2EAF0; --line-2:#EEF3F7;
  --primary:#1D4ED8; --primary-d:#1E40AF; --primary-soft:#E5EDFF;
  --cyan:#06B6D4; --cyan-d:#0891B2; --cyan-soft:#CFFAFE; --navy:#1E3A8A;
  --gold:#B7791F; --gold-soft:#FBF1DE;
  --success:#15803D; --success-soft:#E7F4EC;
  --warn:#C2710C; --warn-soft:#FBEDDD;
  --danger:#DC2626; --danger-soft:#FBE9E9;
  --shadow:0 1px 2px rgba(16,36,31,.04),0 6px 24px rgba(16,36,31,.06);
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:'Tajawal',system-ui,'Segoe UI',Tahoma,sans-serif;
  background:var(--bg); color:var(--ink); font-size:15px; line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:15px}
a{color:inherit}
.hidden{display:none!important}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{
  width:202px;background:var(--surface);border-inline-start:1px solid var(--line);
  position:fixed;inset-block:0;inset-inline-end:0;display:flex;flex-direction:column;
  padding:12px 10px;z-index:40;overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:9px;padding:4px 6px 12px}
.brand .logo{
  width:34px;height:34px;border-radius:50%;flex:0 0 auto;background:#fff;
  background-size:contain;background-position:center;background-repeat:no-repeat;
  display:grid;place-items:center;font-weight:800;font-size:15px;color:var(--primary-d);
  border:1px solid var(--line);box-shadow:0 4px 12px rgba(29,78,216,.20);
}
.brand b{font-size:13.5px;font-weight:800;display:block;line-height:1.25}
.brand span{font-size:10.5px;color:var(--muted)}
.nav{display:flex;flex-direction:column;gap:2px;margin-top:2px}
.nav button{
  display:flex;align-items:center;gap:9px;width:100%;text-align:start;
  padding:7px 10px;border:0;background:transparent;border-radius:9px;
  color:var(--muted);font-weight:500;font-size:13px;transition:.12s;
}
.nav button .ico{width:17px;height:17px;flex:0 0 auto}
.nav button:hover{background:var(--line-2);color:var(--ink)}
.nav button.active{background:var(--primary-soft);color:var(--primary-d);font-weight:700}
.nav .sep{height:1px;background:var(--line);margin:6px 6px}
.side-actions{display:flex;flex-direction:column;gap:4px;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
.side-btn{display:flex;align-items:center;gap:9px;width:100%;text-align:start;padding:8px 10px;border:0;background:transparent;border-radius:9px;color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;transition:.12s}
.side-btn:hover{background:var(--line-2);color:var(--ink)}
.side-btn.danger{color:var(--danger)}
.side-btn.danger:hover{background:#fee2e2}
.quick-login{background:var(--primary-soft);border:1px solid var(--primary);border-radius:12px;padding:12px}
.login-or{display:flex;align-items:center;text-align:center;color:var(--muted);font-size:12px;margin:14px 0}
.login-or::before,.login-or::after{content:"";flex:1;height:1px;background:var(--line)}
.today-total{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding:14px 18px;background:var(--primary);color:#fff;border-radius:14px;font-weight:800}
.today-total span{font-size:14px}.today-total b{font-size:22px}
.today-tbl tbody tr{background:#f7f8fa}
.today-tbl tbody tr:hover{background:#eef1f5}
html.dark .today-tbl tbody tr{background:#0E1626}
.today-tbl .t-vch td{background:#fafafa}
html.dark .today-tbl .t-vch td{background:#0b1220}
.box-chip{display:inline-block;background:#FEF9C3;color:#854D0E;border:1px solid #FDE68A;border-radius:7px;padding:2px 10px;font-size:11.5px;font-weight:800;white-space:nowrap}
.boxsum{border:1px solid var(--line);border-radius:12px;padding:12px;background:var(--surface)}
.boxsum-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-size:13px}
.boxsum-g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.boxsum-g>div{display:flex;flex-direction:column;gap:2px;background:#f8fafc;border-radius:8px;padding:6px 8px}
.boxsum-g span{font-size:10.5px;color:var(--muted)}
.boxsum-g b{font-size:13px}
html.dark .boxsum-g>div{background:#0E1626}
.sidebar-foot{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-size:10.5px;color:var(--muted);text-align:center}

.main{flex:1;margin-inline-end:202px;min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:30;background:rgba(241,247,251,.85);backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);padding:8px 18px;display:flex;align-items:center;gap:12px;
}
.topbar h1{font-size:16px;font-weight:800}
.topbar .sub{font-size:11.5px;color:var(--muted);margin-top:0}
.topbar .spacer{flex:1}
.role-badge{font-size:12px;background:var(--primary-soft);color:var(--primary-d);padding:5px 11px;border-radius:20px;font-weight:700;white-space:nowrap}
/* لوحة بطابع محاسبي (لابتوب) */
.dsh-tools{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.dsh-tool{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:10px 15px;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;box-shadow:var(--shadow);transition:.15s}
.dsh-tool:hover{border-color:var(--primary);color:var(--primary-d);transform:translateY(-1px)}
.dsh-tool svg{width:19px;height:19px}
.erp-dash{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
.erp-side{display:flex;flex-direction:column;gap:14px;position:sticky;top:74px}
.erp-look .look-body{padding:12px}
.look-res{margin-top:8px;display:flex;flex-direction:column;gap:5px;max-height:240px;overflow:auto}
.look-res button{display:flex;align-items:center;gap:8px;text-align:start;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:12.5px;cursor:pointer;color:var(--ink)}
.look-res button:hover{border-color:var(--primary);background:var(--primary-soft)}
.erp-info{display:flex;justify-content:space-between;padding:14px 16px}
.erp-info .muted{display:block;font-size:11.5px;margin-bottom:2px}
.erp-info b{font-size:15px}
.erp-counts{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border-radius:0 0 var(--radius) var(--radius);overflow:hidden}
.erp-counts>div{background:var(--surface);padding:13px;text-align:center;font-size:11.5px;color:var(--muted);font-weight:600;display:flex;flex-direction:column;gap:3px}
.erp-counts>div span{font-size:19px;font-weight:800;color:var(--ink)}
.kv{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px}
.kv:last-child{border-bottom:0}
.kv span{color:var(--muted)}
@media(max-width:860px){
  .erp-dash{grid-template-columns:1fr}
  .erp-side,.dsh-tools{display:none}
}
.content{padding:22px;max-width:1180px;width:100%}
/* شريط الأدوات بطابع برنامج المحاسبة (لابتوب) */
.erpbar{display:flex;align-items:center;gap:10px;padding:5px 14px;background:linear-gradient(180deg,#ffffff,#eef4fb);border-bottom:1px solid var(--line);position:sticky;top:43px;z-index:25;overflow-x:auto}
.erp-brand{display:none}
.erp-tools{display:flex;gap:4px;flex:1}
.erpbtn{display:flex;flex-direction:column;align-items:center;gap:3px;width:58px;flex:0 0 auto;padding:5px 3px;border:1px solid transparent;border-radius:9px;background:transparent;cursor:pointer;transition:.15s}
.erpbtn:hover{background:#fff;border-color:var(--line);box-shadow:var(--shadow)}
.erpbtn.active{background:#fff;border-color:var(--primary);box-shadow:0 0 0 2px var(--primary-soft)}
.erpbtn .ei{width:30px;height:30px;border-radius:9px;display:grid;place-items:center}
.erpbtn small{font-size:9.5px;font-weight:700;color:var(--ink);white-space:nowrap}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);
  background:var(--surface);color:var(--ink);padding:9px 15px;border-radius:10px;
  font-weight:700;font-size:14px;transition:.12s;white-space:nowrap;
}
.btn:hover{border-color:#cfd9d5;background:#fafcfb}
.btn .ico{width:17px;height:17px}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-d);border-color:var(--primary-d)}
.btn-danger{background:var(--danger-soft);border-color:transparent;color:var(--danger)}
.btn-danger:hover{background:#f7dcdc}
.btn-ghost{border-color:transparent;background:transparent;color:var(--muted);padding:8px 10px}
.btn-ghost:hover{background:var(--line-2);color:var(--ink)}
.btn-sm{padding:6px 11px;font-size:13px;border-radius:9px}
.btn-icon{padding:7px;border-radius:9px}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow)}
.stat{display:flex;flex-direction:column;gap:10px}
.stat .top{display:flex;align-items:center;justify-content:space-between}
.stat .label{font-size:12.5px;color:var(--muted);font-weight:600}
.stat .pill{width:38px;height:38px;border-radius:11px;display:grid;place-items:center}
.stat .pill svg{width:19px;height:19px}
.stat .val{font-size:23px;font-weight:800;letter-spacing:-.5px}
.stat .val small{font-size:12px;font-weight:600;color:var(--muted)}

.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-h{display:flex;align-items:center;gap:12px;padding:14px 17px;border-bottom:1px solid var(--line-2)}
.panel-h h3{font-size:15.5px;font-weight:800}
.panel-h .spacer{flex:1}
.panel-b{padding:6px 0}

/* Table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:start;font-weight:700;color:var(--muted);font-size:12.5px;padding:11px 16px;border-bottom:1px solid var(--line);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--line-2);vertical-align:middle}
tr:last-child td{border-bottom:0}
tbody tr:hover{background:#fafcfb}
.t-num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
.code-tag{font-family:ui-monospace,monospace;font-size:12.5px;background:var(--line-2);padding:2px 7px;border-radius:6px;color:var(--muted)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px}
.b-ok{background:var(--success-soft);color:var(--success)}
.b-low{background:var(--warn-soft);color:var(--warn)}
.b-out{background:var(--danger-soft);color:var(--danger)}
.b-gray{background:var(--line-2);color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%}

/* Inputs */
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:13px;font-weight:700;color:var(--ink)}
.inp,select.inp,textarea.inp{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
  background:var(--surface);color:var(--ink);transition:.12s;
}
.inp:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-soft)}
textarea.inp{resize:vertical;min-height:64px}
.search{position:relative;flex:1;min-width:160px;max-width:420px}
.search svg{position:absolute;inset-inline-start:11px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--muted)}
.search .inp{padding-inline-start:36px}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(16,36,31,.42);backdrop-filter:blur(2px);z-index:60;display:grid;place-items:center;padding:16px;overflow:auto;overscroll-behavior:contain}
body.modal-lock{overflow:hidden!important;touch-action:none}
.inapp-notif{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-180%);z-index:9999;background:var(--surface,#fff);color:var(--ink,#0f172a);border:1px solid var(--line,#e2e8f0);border-radius:16px;box-shadow:0 18px 50px rgba(0,0,0,.30);padding:12px 14px;display:flex;gap:11px;align-items:flex-start;width:min(430px,92vw);transition:transform .4s cubic-bezier(.2,.85,.25,1);cursor:pointer}
.inapp-notif.show{transform:translateX(-50%) translateY(0)}
.inapp-notif .ic{width:42px;height:42px;border-radius:13px;flex:0 0 auto;display:grid;place-items:center;background:linear-gradient(135deg,#1D4ED8,#3b82f6);color:#fff;box-shadow:0 6px 16px rgba(29,78,216,.35)}
.inapp-notif .ttl{font-weight:800;font-size:14.5px;margin-bottom:2px}
.inapp-notif .bd{font-size:12.5px;color:var(--muted,#64748b);line-height:1.6;white-space:pre-wrap}
.inapp-notif .cls{margin-inline-start:auto;color:var(--muted,#94a3b8);font-size:20px;line-height:1;background:none;border:0;cursor:pointer;padding:0 2px;flex:0 0 auto}
.modal{background:var(--surface);border-radius:18px;width:100%;max-width:560px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.25)}
.modal.lg{max-width:820px}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--line-2);display:flex;align-items:center;gap:12px}
.modal-h h3{font-size:17px;font-weight:800}
.modal-b{padding:18px 20px;overflow-y:auto}
.modal-f{padding:14px 20px;border-top:1px solid var(--line-2);display:flex;gap:10px;justify-content:flex-start}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.fsec{font-size:12.5px;font-weight:800;color:var(--primary-d);margin:18px 0 9px;border-bottom:1px solid var(--line);padding-bottom:6px}
.fsec:first-child{margin-top:0}
.fhint{font-size:11.5px;color:var(--muted);margin-top:5px;font-weight:600}
.wh-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.wh-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.wh-card{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:14px;padding:13px 14px;background:var(--surface);transition:.15s}
.wh-card:hover{border-color:var(--primary);box-shadow:var(--shadow)}
.wh-ic{width:44px;height:44px;border-radius:11px;display:grid;place-items:center;background:#0e749018;color:#0e7490;flex:none}
.wh-meta{flex:1;min-width:0}
.wh-open{display:flex;align-items:center;gap:12px;flex:1;min-width:0;cursor:pointer;border-radius:10px;padding:2px;transition:.12s}
.wh-open:hover{background:var(--line-2)}
.wh-meta b{display:block;font-size:14.5px}
.wh-meta span{font-size:12px;color:var(--muted)}
.wh-def{font-size:10px;font-weight:700;color:#0e7490;background:#0e749015;padding:1px 6px;border-radius:6px;margin-inline-start:4px}
.wh-actions{display:flex;gap:4px;flex:none}
.wh-qty-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.wh-qty-row{display:flex;align-items:center;justify-content:space-between;gap:10px;background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:7px 12px}
.wh-qty-name{font-size:13px;font-weight:700;display:flex;align-items:center;gap:6px;color:var(--ink)}
.wh-qty-total{font-size:13px;color:var(--muted);font-weight:600}
.wh-qty-total b{color:var(--primary-d);font-size:15px}
html.dark .wh-qty-row{background:#0E1626}
/* فاتورة البيع */
.inv-wrap{display:flex;flex-direction:column;gap:14px}
.inv-head{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;box-shadow:var(--shadow)}
.inv-hgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(122px,1fr));gap:7px}
.inv-hgrid .field{margin:0}
.inv-head .field label{font-size:10px;margin-bottom:2px;color:var(--muted);font-weight:700}
.inv-head .inp{padding:6px 8px;font-size:12px;border-radius:8px}
.inv-bal{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.inv-chip{font-size:12.5px;background:#1D4ED815;color:var(--primary-d);padding:5px 12px;border-radius:9px;font-weight:600}
.inv-chip.warn{background:#d9770615;color:#b45309}
.inv-chip b{font-weight:800}
.inv-body{display:grid;grid-template-columns:2.5fr 0.85fr;gap:12px;align-items:start}
.inv-tblwrap{overflow:auto;max-height:58vh}
.inv-tbl{width:100%;border-collapse:separate;border-spacing:0 3px;font-size:12.5px;padding:0 3px}
.inv-tbl th{position:sticky;top:0;background:#e8eef7;color:#334155;font-size:11px;font-weight:800;padding:7px 5px;text-align:center;white-space:nowrap;z-index:1}
.inv-tbl th:first-child{border-start-start-radius:8px}.inv-tbl th:last-child{border-start-end-radius:8px}
.inv-tbl tbody tr{background:#f6f8fb}
.inv-tbl tbody tr:nth-child(even){background:#eef2f8}
.inv-tbl tbody tr:hover{background:#e0e9f7}
.inv-tbl td{padding:6px 5px;text-align:center;vertical-align:middle;border-top:1px solid #d8e0ec;border-bottom:1px solid #d8e0ec}
.inv-tbl td:first-child{border-inline-start:1px solid #d8e0ec;border-start-start-radius:9px;border-end-start-radius:9px}
.inv-tbl td:last-child{border-inline-end:1px solid #d8e0ec;border-start-end-radius:9px;border-end-end-radius:9px}
.inv-tbl td:nth-child(2){text-align:start}
.il-name{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.inp-mini{padding:4px 5px;width:54px;text-align:center;font-size:12px}
html.dark .inv-tbl th{background:#16233b;color:#cbd5e1}
html.dark .inv-tbl tbody tr{background:#0E1626}
html.dark .inv-tbl tbody tr:nth-child(even){background:#121d33}
html.dark .inv-tbl tbody tr:hover{background:#1a2942}
html.dark .inv-tbl td{border-color:#1e2d47}
.inv-foot{border-top:1px solid var(--line);padding:10px 12px;margin-top:4px}
.inv-sums{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.inv-sums>div{background:#f8fafc;border:1px solid var(--line);border-radius:9px;padding:5px 8px;display:flex;flex-direction:column;gap:1px}
.inv-sums>div span{font-size:10px;color:var(--muted)}
.inv-sums>div b{font-size:13px}
.inv-sums .net{background:var(--primary);border-color:var(--primary)}
.inv-sums .net span,.inv-sums .net b{color:#fff}
.inv-sums .net b{font-size:14px}
html.dark .inv-sums>div{background:#0E1626}
.inv-footrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:space-between}
.pay-inline{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:12px}
.pay-inline .pl{font-weight:700;color:var(--muted)}
.pay-inline .inp{padding:5px 7px;font-size:12.5px}
.pay-cash{font-size:12.5px;color:var(--muted)}.pay-cash b{color:var(--primary-d)}
.pay-state{font-size:11.5px;color:var(--muted)}
.foot-btns{display:flex;gap:6px;flex-wrap:wrap}
.btn-xs{padding:6px 10px;font-size:12px;border-radius:8px;gap:4px}
.pay-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.pay-chip{display:inline-flex;align-items:center;gap:6px;background:#16a34a14;color:#15803d;border:1px solid #16a34a33;border-radius:8px;padding:3px 9px;font-size:12px;font-weight:600;cursor:pointer}
.pay-chip b{color:#dc2626;font-size:11px}
.inv-pay{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap}
.inv-pay .field{margin:0;flex:1;min-width:160px}
.inv-rem{display:flex;flex-direction:column;gap:2px;font-size:12px;min-width:120px}
.inv-rem b{font-size:15px}
.t-red{color:var(--danger)!important}.t-green{color:var(--success)!important}
.inv-act{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.inv-act .btn{flex:1;min-width:calc(50% - 4px);justify-content:center;padding:11px}
.inv-side-body{display:flex;flex-direction:column;gap:8px;padding:10px 12px}
.sale-search-wrap{position:relative}
.sale-results{display:none;flex-direction:column;gap:3px;position:absolute;inset-inline:0;top:calc(100% + 4px);z-index:30;background:var(--surface);border:1px solid var(--primary);border-radius:10px;box-shadow:0 10px 28px rgba(0,0,0,.16);max-height:300px;overflow:auto;padding:5px}
.sale-results.open{display:flex}
.sale-res.sel{border-color:var(--primary);background:#1D4ED812}
.sale-res{display:flex;justify-content:space-between;align-items:center;gap:8px;border:1px solid var(--line);border-radius:9px;padding:7px 10px;cursor:pointer;font-size:13px}
.sale-res:hover{border-color:var(--primary);background:#1D4ED808}
.sale-res.dim{opacity:.55;cursor:default}
.sale-res span{display:block;font-size:11px;color:var(--muted)}
.entry-card{border:1px solid var(--line);border-radius:12px;padding:10px;background:#f8fafc}
html.dark .entry-card{background:#0E1626}
.entry-name b{font-size:13.5px}.entry-name span{display:block;font-size:11px;color:var(--muted);margin-bottom:6px}
.entry-info{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px}
.entry-info>div{background:var(--surface);border:1px solid var(--line);border-radius:8px;padding:5px 7px}
.entry-info label{font-size:10px;color:var(--muted);display:block}
.entry-info b{font-size:13px}
.entry-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.entry-grid .field{margin:0}
.entry-grid label{font-size:10px}
.entry-grid .inp{padding:6px;font-size:12.5px}
.entry-tot{display:flex;justify-content:space-between;margin-top:8px;font-size:12.5px}
.entry-tot b{color:var(--primary-d);font-size:15px}
.svc-tag{background:#7c3aed18;color:#7c3aed;font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px}
.svc-pick{display:flex;flex-wrap:wrap;gap:8px}
.svc-btn{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;color:var(--ink)}
.svc-btn:hover{border-color:var(--primary);background:#1D4ED808}
.svc-btn span{font-size:11px;color:var(--muted);font-weight:600}
.box-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.box-card{display:flex;flex-direction:column}
.box-card .box-top{display:flex;justify-content:space-between;align-items:center;color:var(--muted)}
.box-card .val{font-size:22px;font-weight:800;margin-top:4px}
.box-card.total{background:linear-gradient(135deg,#1D4ED8,#1e40af);color:#fff}
.box-card.total .label,.box-card.total .box-top{color:#fff!important;opacity:.95}
.box-card.total .val,.box-card.total .muted,.box-card.total b{color:#fff!important}
.set-list{display:flex;flex-direction:column;gap:8px}
.set-row{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid var(--line);border-radius:11px;padding:10px 13px}
.set-row b{font-size:14px}.set-row span{display:block;font-size:11.5px;color:var(--muted)}
.line-note{font-size:11px;color:#b45309;background:#fef3c7;border-radius:6px;padding:2px 7px;margin-top:3px;display:inline-block}
html.dark .line-note{background:#78350f;color:#fde68a}
.inv-pays{border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:4px}
.inv-pays-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:13px}
.pay-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px dashed var(--line)}
.pay-row .t-num{font-weight:700;min-width:90px}
.pay-sum{text-align:end;margin-top:6px;font-size:13px}
.mini-inv{position:fixed;bottom:14px;inset-inline-start:14px;z-index:80;background:var(--surface);border:1px solid var(--primary);border-radius:14px;box-shadow:0 8px 28px rgba(0,0,0,.18);padding:8px 12px;display:flex;align-items:center;gap:10px}
.mini-inv .mini-info{display:flex;align-items:center;gap:8px;color:var(--primary-d)}
.mini-inv .mini-info b{font-size:13px;display:block}
.mini-inv .mini-info span{font-size:11.5px;color:var(--muted)}
.wh-pill{display:inline-block;background:#0e749014;color:#0e7490;border-radius:7px;padding:1px 8px;font-size:11px;font-weight:700}
.mini-grip{cursor:grab;color:var(--muted);font-size:18px;line-height:1;padding:2px 4px;touch-action:none;user-select:none}
.mini-grip:active{cursor:grabbing}
.inv-min-note{text-align:center;color:var(--muted);font-size:13px;padding:30px 16px;border:1px dashed var(--line);border-radius:14px;background:var(--surface)}
.cust-img{width:84px;height:84px;border-radius:14px;border:2px dashed var(--line);background:#f1f5f9 center/cover no-repeat;cursor:pointer;display:grid;place-items:center}
.cust-img.has{border-style:solid}
html.dark .cust-img{background:#0E1626}
.qstep{display:flex;align-items:stretch;gap:6px}
.qstep .inp{flex:1}
.qbtn{width:46px;flex:0 0 auto;border:1px solid var(--line);background:var(--surface);border-radius:10px;font-size:21px;font-weight:800;color:var(--primary-d);cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none}
.qbtn:active{background:var(--primary-soft)}
.utable{display:flex;flex-direction:column;gap:6px}
.urow{display:grid;grid-template-columns:92px 1fr 1fr 1fr;gap:8px;align-items:center}
.urow-h{font-size:11px;color:var(--muted);font-weight:700}
.urow .uname{font-weight:700;font-size:13px}
.urow .ucell-na{color:var(--muted);text-align:center}
@media(max-width:600px){.urow{grid-template-columns:64px 1fr 1fr 1fr;gap:5px}.urow .inp{padding:7px 7px;font-size:12px}.urow-h{font-size:10px}}

/* Toast */
.toasts{position:fixed;top:14px;left:0;right:0;bottom:auto;z-index:95;display:flex;flex-direction:column;align-items:center;gap:9px;padding:0 16px;pointer-events:none}
.toast{background:rgba(17,24,31,.40);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);color:#fff;padding:11px 18px;border-radius:24px;font-weight:700;font-size:14px;line-height:1.5;box-shadow:0 8px 24px rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.18);text-shadow:0 1px 3px rgba(0,0,0,.45);display:flex;align-items:center;gap:9px;animation:tin .25s;max-width:min(420px,92vw);text-align:center;justify-content:center;pointer-events:auto}
.toast.ok{background:rgba(21,128,61,.48)} .toast.err{background:rgba(220,38,38,.48)}
@keyframes tin{from{opacity:0;transform:translateY(-10px)}}

/* Empty */
.empty{text-align:center;padding:46px 20px;color:var(--muted)}
.empty svg{width:42px;height:42px;opacity:.4;margin-bottom:10px}
.empty b{display:block;color:var(--ink);font-size:15px;margin-bottom:3px}

/* Statement / list rows */
.row-line{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--line-2)}
.row-line:last-child{border-bottom:0}
.muted{color:var(--muted)}
.amt-in{color:var(--success);font-weight:800}
.amt-out{color:var(--danger);font-weight:800}

/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.chip{font-size:13px;font-weight:600;padding:6px 13px;border-radius:20px;border:1px solid var(--line);background:var(--surface);color:var(--muted)}
.chip.active{background:var(--ink);color:#fff;border-color:var(--ink)}

/* Mobile nav */
.mtop{display:none}
.mobilenav{display:none}
@media(max-width:860px){
  .sidebar{display:none}
  .erpbar{display:none}
  .main{margin-inline-end:0}
  .mtop{display:inline-flex}
  .topbar{padding:11px 14px;gap:8px}
  .topbar h1{font-size:16px;line-height:1.25}
  .topbar .sub{display:none}
  .content{padding:14px 12px 88px}
  .grid2,.grid3{grid-template-columns:1fr}
  .cards{grid-template-columns:1fr 1fr;gap:10px}
  .card{padding:13px 14px}
  .stat{gap:8px}
  .stat .val{font-size:20px}
  .stat .pill{width:34px;height:34px}
  .dash-grid,.rep-grid{grid-template-columns:1fr!important}
  .mobilenav{
    display:flex;position:fixed;inset-inline:0;bottom:0;z-index:50;background:var(--surface);
    border-top:1px solid var(--line);padding:6px 4px;justify-content:space-around;
  }
  .mobilenav button{border:0;background:transparent;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);font-size:10.5px;font-weight:600;padding:5px 6px;border-radius:10px}
  .mobilenav button svg{width:21px;height:21px}
  .mobilenav button.active{color:var(--primary-d)}
}
@media print{
  .sidebar,.topbar,.mobilenav,.toolbar,.no-print{display:none!important}
  .main{margin:0} .content{padding:0;max-width:100%}
  .panel{box-shadow:none;border:1px solid #ccc}
  body{background:#fff}
}

/* drawer for mobile menu */
.drawer{position:fixed;inset:0;z-index:70;display:none}
.drawer.open{display:block}
.drawer .scrim{position:absolute;inset:0;background:rgba(16,36,31,.4)}
.drawer .sheet{position:absolute;inset-block:0;inset-inline-end:0;width:264px;background:var(--surface);padding:18px 14px;overflow-y:auto;box-shadow:-8px 0 30px rgba(0,0,0,.2)}

/* ====================== واجهة المتجر ====================== */
#storefront{max-width:560px;margin:0 auto;background:#fff;min-height:100vh;padding-bottom:96px}
@media(min-width:760px){#storefront{max-width:1180px}}

/* رأس + بحث بأسلوب علي بابا */
.sf-top{background:linear-gradient(165deg,#0A285F,#1D4ED8 70%,#2563EB);color:#fff;padding:0 0 16px;border-radius:0 0 22px 22px;position:relative;overflow:hidden}
.sf-top::before{content:"";position:absolute;top:-70px;inset-inline-start:-50px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(34,211,238,.4),transparent 70%)}
.sf-topbar{position:relative;z-index:2;display:flex;align-items:center;gap:12px;padding:13px 14px 4px}
.sf-ic{width:40px;height:40px;border-radius:12px;border:0;background:rgba(255,255,255,.16);color:#fff;display:grid;place-items:center;position:relative;flex:0 0 auto}
.sf-ic svg{width:20px;height:20px}
.lang-btn{width:auto!important;min-width:40px;padding:0 12px;font-weight:800;font-size:13px;letter-spacing:.5px}
.sf-search .cam.rec{color:#fff;background:var(--danger);border-radius:50%;animation:recPulse 1s infinite}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.5)}50%{box-shadow:0 0 0 6px rgba(220,38,38,0)}}
.sf-brand{flex:1;display:flex;align-items:center;gap:9px;justify-content:center}
.sf-logo{width:36px;height:36px;border-radius:50%;background:#fff center/contain no-repeat;border:2px solid rgba(255,255,255,.8);flex:0 0 auto}
.sf-brand b{font-size:15px;font-weight:800}
.sf-search{position:relative;z-index:2;margin:8px 14px 0;display:flex;align-items:center;background:#fff;border-radius:30px;padding:5px 6px;box-shadow:0 10px 26px rgba(8,25,66,.28)}
.sf-search .cam{width:36px;height:36px;border-radius:50%;border:0;background:transparent;color:var(--primary);display:grid;place-items:center;flex:0 0 auto}
.sf-search .cam svg{width:21px;height:21px}
.sf-search input{flex:1;border:0;outline:none;font-size:14.5px;background:transparent;color:var(--ink);padding:0 6px;min-width:0}
.sf-search .go{border:0;border-radius:24px;padding:10px 17px;color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--cyan-d),var(--primary));flex:0 0 auto}
.sf-search .go svg{width:16px;height:16px}

/* إجراءات سريعة */
.qa-row{display:flex;gap:10px;overflow-x:auto;padding:14px 14px 2px;scrollbar-width:none}
.qa-row::-webkit-scrollbar{display:none}
.qa-card{flex:0 0 auto;display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:16px;padding:11px 14px;box-shadow:var(--shadow)}
.qa-card .qa-ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto}
.qa-card .qa-ic svg{width:20px;height:20px}
.qa-card b{font-size:13px;font-weight:800;color:var(--ink);line-height:1.3;display:block}
.qa-card span{font-size:11px;color:var(--muted)}

/* عناوين الأقسام */
.sf-sec{padding:18px 14px 0}
.sf-sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.sf-sec-h h2{font-size:16.5px;font-weight:800;color:var(--ink)}
.sf-sec-h .more{border:0;background:transparent;color:var(--primary);font-weight:700;font-size:12.5px}

/* تايلات الأقسام */
.cat-row{display:flex;gap:14px;overflow-x:auto;padding:14px 2px 4px;scrollbar-width:none}
.cat-row::-webkit-scrollbar{display:none}
.cat-item{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;border:0;background:transparent;width:64px}
.cat-tile{width:60px;height:60px;border-radius:50%;background:linear-gradient(145deg,#EEF4FF,#DDF6FB);border:1px solid #E2EAF5;display:grid;place-items:center;box-shadow:var(--shadow);transition:.15s}
.cat-item:active .cat-tile{transform:scale(.93)}
.cat-tile svg{width:26px;height:26px;color:var(--primary-d)}
.cat-tile.on{background:linear-gradient(145deg,var(--primary),var(--cyan-d));border-color:transparent}
.cat-tile.on svg{color:#fff}
.cat-label{font-size:11.5px;font-weight:600;color:#475569;text-align:center;margin-top:7px;line-height:1.25}

/* صف عروض أفقي */
.deal-row{display:flex;gap:12px;overflow-x:auto;padding:14px 2px 4px;scrollbar-width:none}
.deal-row::-webkit-scrollbar{display:none}
.deal-card{flex:0 0 auto;width:120px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;box-shadow:var(--shadow)}
.deal-img{height:76px;position:relative;background:linear-gradient(135deg,#EEF3FF,#DDF6FB) center/cover no-repeat;display:grid;place-items:center}
.deal-img svg{width:30px;height:30px;color:var(--primary);opacity:.5}
.deal-price{position:absolute;bottom:7px;inset-inline-start:7px;background:rgba(8,25,66,.82);color:#fff;font-weight:800;font-size:11px;padding:2px 8px;border-radius:20px}
.deal-info{padding:7px 9px 9px}
.deal-name{font-size:11.5px;font-weight:600;line-height:1.35;height:31px;overflow:hidden}
.deal-tag{font-size:10.5px;color:#E11D48;font-weight:800;margin-top:3px}

/* تبويبات الأقسام */
.cat-tabs{display:flex;gap:8px;overflow-x:auto;padding:6px 0 4px;scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex:0 0 auto;border:0;background:#F1F5F9;color:#475569;font-weight:700;font-size:13px;padding:8px 16px;border-radius:20px}
.cat-tab.on{background:var(--primary);color:#fff}

/* شبكة المنتجات */
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-top:10px}
@media(min-width:640px){.prod-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.prod-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:1120px){.prod-grid{grid-template-columns:repeat(5,1fr)}}
.prod-card{border:1px solid var(--line);border-radius:16px;overflow:hidden;background:#fff;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.prod-img{height:132px;position:relative;background:linear-gradient(135deg,#EEF3FF,#DDF6FB) center/cover no-repeat;display:grid;place-items:center}
.prod-img svg{width:30px;height:30px;color:var(--primary);opacity:.5}
.prod-badge{position:absolute;bottom:8px;inset-inline-start:8px;background:rgba(8,25,66,.82);color:#fff;font-weight:800;font-size:13px;padding:3px 10px;border-radius:20px}
.prod-out{position:absolute;top:8px;inset-inline-start:8px;background:var(--danger);color:#fff;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px}
.disc-badge{position:absolute;top:8px;inset-inline-end:8px;background:#E11D48;color:#fff;font-size:11px;font-weight:800;padding:2px 8px;border-radius:10px;box-shadow:0 2px 8px rgba(225,29,72,.4)}
.old-price{color:#94A3B8;font-weight:600;font-size:11px;text-decoration:line-through;margin-inline-start:5px}

/* شارات المنتج */
.ptag{position:absolute;top:8px;inset-inline-start:8px;color:#fff;font-size:10.5px;font-weight:800;padding:2px 9px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.18)}
.tag-new{background:#2563EB}.tag-top{background:#B7791F}.tag-lim{background:#C2410C}
/* قلب المفضّلة */
.fav-btn{position:absolute;bottom:8px;inset-inline-end:8px;width:32px;height:32px;border-radius:50%;border:0;background:rgba(255,255,255,.92);display:grid;place-items:center;box-shadow:0 2px 8px rgba(0,0,0,.18);z-index:2}
.fav-btn svg{width:17px;height:17px;color:#94A3B8}
.fav-btn.on svg{color:#E11D48;fill:#E11D48}
/* عدّاد الكمية على البطاقة */
.card-step{display:flex;align-items:center;gap:8px;background:var(--primary-soft);border-radius:11px;padding:2px}
.card-step button{width:28px;height:28px;border:0;background:#fff;color:var(--primary-d);border-radius:9px;font-size:16px;font-weight:800;display:grid;place-items:center}
.card-step b{min-width:18px;text-align:center;color:var(--primary-d);font-size:14px}
/* معرض الصور في التفاصيل */
.pd-gallery{position:relative}
.pd-main{height:210px;border-radius:16px;background:linear-gradient(135deg,#EEF3FF,#DDF6FB) center/cover no-repeat;display:grid;place-items:center}
.pd-thumbs{display:flex;gap:8px;justify-content:center;margin-top:10px;flex-wrap:wrap}
.pd-thumb{width:52px;height:52px;border-radius:10px;background:#eef2f7 center/cover no-repeat;border:2px solid transparent;cursor:pointer}
.pd-thumb.on{border-color:var(--primary)}
/* تذييل المتجر */
.sf-footer{margin-top:26px;background:var(--navy);color:#cbd5e1;padding:22px 18px 24px;text-align:center}
.sf-footer .ft-logo{width:54px;height:54px;border-radius:50%;background:#fff center/contain no-repeat;margin:0 auto 10px}
.sf-footer h4{color:#fff;font-size:16px;font-weight:800;margin-bottom:4px}
.sf-footer .ft-row{font-size:13px;margin:5px 0;display:flex;align-items:center;justify-content:center;gap:7px}
.sf-footer .ft-row svg{width:15px;height:15px;opacity:.85}
.sf-footer .ft-social{display:flex;gap:12px;justify-content:center;margin-top:14px}
.sf-footer .ft-social a{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);display:grid;place-items:center;color:#fff}
.sf-footer .ft-social svg{width:19px;height:19px}
.sf-footer .ft-copy{font-size:11.5px;opacity:.6;margin-top:14px}
/* لماذا + طرق الدفع داخل التذييل */
.ft-why{font-size:13px;font-weight:800;color:#fff;margin:18px 0 9px}
.ft-badges{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:340px;margin:0 auto}
.ft-badge{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:11px;padding:8px 10px;text-align:start}
.ft-badge>span{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;flex:0 0 auto;background:rgba(255,255,255,.13);color:#fff}
.ft-badge>span svg{width:15px;height:15px}
.ft-badge b{font-size:11px;font-weight:800;color:#fff;display:block;line-height:1.25}
.ft-badge i{font-size:9.5px;color:#aebbd0;font-style:normal}
.ft-paytitle{font-size:12.5px;font-weight:800;color:#fff;margin:16px 0 8px}
.ft-pays{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:360px;margin:0 auto}
.ft-pays span{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border-radius:9px;padding:5px 9px;font-size:11px;font-weight:700;color:#e8eef7}
.ft-pays span svg{width:13px;height:13px;color:#cfe0ff}
.ft-info{margin-top:16px}
/* شريط الثقة + طرق الدفع */
.sf-trust{padding:22px 14px 0}
.trust-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.trust-badge{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px;box-shadow:var(--shadow)}
.trust-badge .ti{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto;background:var(--primary-soft);color:var(--primary-d)}
.trust-badge .ti svg{width:19px;height:19px}
.trust-badge b{font-size:12.5px;font-weight:800;color:var(--ink);display:block;line-height:1.3}
.trust-badge span{font-size:10.5px;color:var(--muted)}
.pay-title{font-size:14px;font-weight:800;color:var(--ink);margin:18px 0 9px}
.pay-row{display:flex;flex-wrap:wrap;gap:8px}
.pay-chip{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--ink)}
.pay-chip svg{width:15px;height:15px;color:var(--primary)}
/* زر العودة للأعلى */
.to-top{position:fixed;bottom:104px;inset-inline-start:14px;z-index:54;width:42px;height:42px;border-radius:50%;border:0;background:var(--primary);color:#fff;display:none;place-items:center;box-shadow:0 6px 18px rgba(29,78,216,.4)}
.to-top.show{display:grid}
.to-top svg{width:20px;height:20px}

/* ====== الوضع الليلي ====== */
html.dark{--bg:#0E1626;--surface:#16213A;--ink:#E6EDF7;--muted:#93A2BD;--line:#27324A;--line-2:#202b40;--primary-soft:#1B2A4A;--cyan-soft:#16323A}
html.dark body{background:var(--bg);color:var(--ink)}
html.dark #storefront{background:var(--bg)}
html.dark .prod-card,html.dark .deal-card,html.dark .qa-card,html.dark .brand-chip,html.dark .cat-tile{background:var(--surface);border-color:var(--line)}
html.dark .prod-img,html.dark .deal-img,html.dark .pd-main{background:linear-gradient(135deg,#1B2742,#16323A)}
html.dark .sf-search{background:var(--surface)}
html.dark .sf-search input{color:var(--ink)}
html.dark .cat-tab{background:#1B2742;color:#aeb9d0}
html.dark .cat-tab.on{background:var(--primary);color:#fff}
html.dark .store-nav{background:rgba(16,22,38,.95);border-color:var(--line)}
html.dark .cart-sheet,html.dark .modal,html.dark .menu-card{background:var(--surface);color:var(--ink)}
html.dark .menu-item{color:var(--ink);border-color:var(--line-2)}
html.dark .fav-btn{background:rgba(30,41,66,.9)}
html.dark .card-step{background:#1B2A4A}
html.dark .card-step button{background:#0E1626;color:#9fc0ff}
html.dark .inp,html.dark select.inp,html.dark textarea.inp{background:#0E1626;color:var(--ink);border-color:var(--line)}
/* لوحة الإدارة في الوضع الليلي */
html.dark .sidebar,html.dark .topbar{background:var(--surface);border-color:var(--line)}
html.dark .topbar{background:rgba(22,33,58,.92)}
html.dark .topbar h1{color:var(--ink)}
html.dark .erpbar{background:linear-gradient(180deg,#16213A,#0E1626);border-color:var(--line)}
html.dark .erpbtn small{color:var(--ink)}
html.dark .erpbtn:hover{background:#1B2A4A;border-color:var(--line);box-shadow:none}
html.dark .erpbtn.active{background:#1B2A4A;border-color:var(--primary)}
html.dark .panel,html.dark .card,html.dark .dsh-tool{background:var(--surface);border-color:var(--line)}
html.dark th{background:#1B2742;color:#aeb9d0}
html.dark td{border-color:var(--line-2)}
html.dark .inv-sums>div,html.dark .boxsum,html.dark .boxsum-g>div{background:#0E1626;border-color:var(--line)}
html.dark .today-tbl tbody tr{background:#16213A}
html.dark .today-tbl .t-vch td{background:#131d33}
html.dark .inv-tbl th{background:#1B2742;color:#aeb9d0}
html.dark .side-btn:hover{background:#1B2A4A}
html.dark .pd-thumb{background-color:#1B2742}
.prod-info{padding:10px 11px 12px;display:flex;flex-direction:column;gap:5px;flex:1}
.prod-cat{font-size:10.5px;color:var(--cyan-d);font-weight:700}
.prod-name{font-size:13px;font-weight:600;line-height:1.45;flex:1}
.prod-foot{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
.prod-price{font-size:15px;font-weight:800;color:var(--primary-d)}
.prod-price small{font-size:10px;font-weight:600;color:var(--muted)}
.prod-add{flex:0 0 auto;width:32px;height:32px;border:0;background:var(--primary);color:#fff;border-radius:11px;display:grid;place-items:center}
.prod-add svg{width:16px;height:16px}
.prod-add:active{background:var(--primary-d)}
.prod-add:disabled{background:#cbd5e1}

/* شريط سفلي */
.store-nav{position:fixed;inset-inline:0;bottom:0;z-index:55;max-width:1180px;margin:0 auto;background:rgba(255,255,255,.95);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;justify-content:space-around;align-items:center;padding:7px 2px 9px}
.sn-item{position:relative;border:0;background:transparent;color:#64748B;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:5px 7px;border-radius:12px}
.sn-item svg{width:22px;height:22px}
.sn-item.active{color:var(--primary)}
.sn-wa svg path{fill:#25D366}
.sn-badge{position:absolute;top:-1px;inset-inline-end:5px;background:var(--cyan);color:#fff;font-size:9.5px;font-weight:800;min-width:16px;height:16px;border-radius:9px;display:grid;place-items:center;padding:0 4px}

/* درج السلة */
.cart-drawer{position:fixed;inset:0;z-index:80;display:none}
.cart-drawer.open{display:block}
.cart-drawer .scrim{position:absolute;inset:0;background:rgba(8,25,66,.5)}
.cart-sheet{position:absolute;inset-inline:0;bottom:0;max-width:560px;margin:0 auto;background:#fff;border-radius:24px 24px 0 0;max-height:82vh;display:flex;flex-direction:column;animation:slideUp .25s}
@keyframes slideUp{from{transform:translateY(100%)}}
.cart-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line-2);font-size:16px;font-weight:800}
.cart-head button{border:0;background:var(--line-2);width:32px;height:32px;border-radius:50%;font-size:15px}
.cart-items{overflow-y:auto;padding:6px 0;flex:1}
.cart-row{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line-2)}
.cart-foot{padding:16px 18px;border-top:1px solid var(--line-2)}
.qty-ctrl{display:flex;align-items:center;gap:8px}
.qty-ctrl button{width:30px;height:30px;border-radius:9px;border:1px solid var(--line);background:#fff;font-size:16px;font-weight:700}
.store-cta{width:100%;border:0;color:#fff;padding:14px;border-radius:14px;font-size:15px;font-weight:700}

@media(min-width:1200px){#storefront,.store-nav{box-shadow:0 0 0 1px var(--line)}}

/* القائمة المنسدلة */
.menu-drop{position:fixed;inset:0;z-index:75;display:none}
.menu-drop.open{display:block}
.menu-drop .scrim{position:absolute;inset:0;background:rgba(8,25,66,.35)}
.menu-card{position:absolute;top:60px;inset-inline-start:12px;width:min(264px,74vw);background:#fff;
  border-radius:18px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.32);animation:menuIn .2s}
@keyframes menuIn{from{opacity:0;transform:translateY(-10px) scale(.98)}}
.menu-head{background:linear-gradient(135deg,var(--primary),var(--primary-d));color:#fff;
  padding:14px 15px;display:flex;align-items:center;gap:10px}
.menu-ava{width:40px;height:40px;border-radius:50%;flex:0 0 auto;background:#fff center/contain no-repeat;
  border:2px solid rgba(255,255,255,.75)}
.menu-name{font-size:15px;font-weight:800;flex:1}
.menu-list{padding:2px 0}
.menu-item{display:flex;align-items:center;gap:12px;width:100%;padding:12px 15px;border:0;background:transparent;
  text-align:start;font-size:14px;font-weight:700;color:#1e293b;border-bottom:1px solid var(--line-2)}
.menu-item:last-child{border-bottom:0}
.menu-item:active{background:var(--line-2)}
.menu-item .mlabel{flex:1}
.menu-item .micon{width:32px;height:32px;border-radius:10px;display:grid;place-items:center;flex:0 0 auto}
.menu-item .micon svg{width:17px;height:17px}
</style>
</head>
<body>

<!-- ====================== واجهة المتجر (الزبائن) ====================== -->
<div id="storefront">
  <header class="sf-top">
    <div class="sf-topbar">
      <button class="sf-ic" onclick="openStoreMenu()" aria-label="القائمة">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      <div class="sf-brand"><div class="sf-logo" id="sfLogo"></div><b data-i18n="brand">مؤسسة الصداقة</b></div>
      <button class="sf-ic lang-btn" id="langBtn" onclick="toggleLang()" aria-label="اللغة">FR</button>
      <button class="sf-ic" onclick="openNotifications()" aria-label="الإشعارات" style="position:relative">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        <span class="sn-badge" id="notifBadge" style="display:none">0</span></button>
      <button class="sf-ic" onclick="openCart()" aria-label="السلة">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.6"/><circle cx="17" cy="20" r="1.6"/><path d="M2 3h3l2.5 12.5a1.6 1.6 0 0 0 1.6 1.3h8.3a1.6 1.6 0 0 0 1.6-1.2L22 7H6"/></svg>
        <span class="sn-badge" id="cartCountHero" style="display:none">0</span></button>
    </div>
    <div class="sf-search">
      <button class="cam" onclick="openImageSearch('store')" aria-label="بحث بصورة">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h3l2-2h8l2 2h3v12H3z"/><circle cx="12" cy="13" r="3.2"/></svg></button>
      <button class="cam" onclick="startVoiceSearch()" aria-label="بحث صوتي" id="micBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="3" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0M12 18v3"/></svg></button>
      <input id="storeQ" data-i18n-ph="searchPh" placeholder="ابحث عن منتج أو كود..." oninput="renderStoreGrid()" onfocus="scrollToProducts()">
      <button class="go" onclick="scrollToProducts()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg><span data-i18n="search">بحث</span></button>
    </div>
  </header>

  <div class="qa-row">
    <button class="qa-card" onclick="scrollToProducts()"><span class="qa-ic" style="background:#E5EDFF;color:#1D4ED8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span><div><b data-i18n="qaCats">تصفّح الأقسام</b><span data-i18n="qaCatsSub">كل المنتجات</span></div></button>
    <button class="qa-card" onclick="scrollToDeals()"><span class="qa-ic" style="background:#FBF1DE;color:#B7791F"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h12v3a6 6 0 0 1-12 0zM4 5h2M18 5h2M9 14h6M8 20h8M10 14v3M14 14v3"/></svg></span><div><b data-i18n="qaTop">الأكثر مبيعاً</b><span data-i18n="qaTopSub">أفضل العروض</span></div></button>
    <button class="qa-card" onclick="openWhatsApp()"><span class="qa-ic" style="background:#E7F7EE;color:#25D366"><svg viewBox="0 0 24 24" fill="#25D366"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2zm0 18.2c-1.6 0-3-.4-4.3-1.2l-.3-.2-2.9.8.8-2.8-.2-.3A8.2 8.2 0 1 1 12 20.2z"/></svg></span><div><b data-i18n="qaWa">طلب عبر واتساب</b><span data-i18n="qaWaSub">تواصل سريع</span></div></button>
  </div>

  <section class="sf-sec">
    <div class="sf-sec-h"><h2 data-i18n="secCats">الأقسام</h2><button class="more" onclick="storeCat='';renderCats();renderCatTabs();renderStoreGrid()" data-i18n="seeAll">عرض الكل ›</button></div>
    <div class="cat-row" id="catRow"></div>
  </section>

  <section class="sf-sec" id="dealsSec">
    <div class="sf-sec-h"><h2 data-i18n="secDeals">أفضل العروض</h2><button class="more" onclick="scrollToProducts()" data-i18n="more">المزيد ›</button></div>
    <div class="deal-row" id="dealRow"></div>
  </section>

  <section class="sf-sec" id="productsSec" style="padding-top:18px">
    <div class="sf-sec-h"><h2 id="prodSecTitle">كل المنتجات</h2></div>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="prod-grid" id="storeGrid"></div>
  </section>
</div>

<nav class="store-nav" id="storeNav">
  <button class="sn-item active" onclick="scrollStoreTop()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-8 9 8M5 9v11h14V9"/></svg><span data-i18n="navHome">الرئيسية</span></button>
  <button class="sn-item" onclick="scrollToProducts()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><span data-i18n="navCats">الأقسام</span></button>
  <button class="sn-item" onclick="openCart()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="20" r="1.6"/><circle cx="17" cy="20" r="1.6"/><path d="M2 3h3l2.5 12.5a1.6 1.6 0 0 0 1.6 1.3h8.3a1.6 1.6 0 0 0 1.6-1.2L22 7H6"/></svg>
    <span class="sn-badge" id="cartCount" style="display:none">0</span><span data-i18n="navCart">السلة</span></button>
  <button class="sn-item sn-wa" onclick="openWhatsApp()">
    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2zm0 18.2c-1.6 0-3-.4-4.3-1.2l-.3-.2-2.9.8.8-2.8-.2-.3A8.2 8.2 0 1 1 12 20.2zm4.5-6.1c-.2-.1-1.4-.7-1.7-.8-.2-.1-.4-.1-.5.1-.2.2-.6.8-.7 1-.2.1-.3.1-.5 0-1.4-.6-2.3-1.2-3.2-2.8-.2-.4.2-.4.6-1.3.1-.1 0-.3 0-.4 0-.1-.5-1.3-.7-1.8-.2-.5-.4-.4-.5-.4h-.5c-.1 0-.4.1-.6.3-.2.2-.8.8-.8 2s.9 2.3 1 2.5c.1.2 1.7 2.7 4.2 3.7 1.6.6 2.2.7 2.9.6.5-.1 1.4-.6 1.6-1.1.2-.6.2-1 .1-1.1 0-.1-.2-.2-.4-.3z" fill="#25D366"/></svg><span data-i18n="navWa">واتساب</span></button>
  <button class="sn-item" onclick="adminLogin()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="3.4"/><path d="M5 20a7 7 0 0 1 14 0"/></svg><span data-i18n="navAccount">حساب</span></button>
</nav>

<button class="to-top" id="toTop" onclick="scrollStoreTop()" aria-label="up"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>

<!-- درج السلة -->
<div class="cart-drawer" id="cartDrawer">
  <div class="scrim" onclick="closeCart()"></div>
  <div class="cart-sheet">
    <div class="cart-head"><span>🛒 سلة المشتريات</span><button onclick="closeCart()">✕</button></div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-foot" id="cartFoot"></div>
  </div>
</div>

<!-- القائمة المنسدلة (زر الثلاث شرطات) -->
<div class="menu-drop" id="storeMenu">
  <div class="scrim" onclick="closeStoreMenu()"></div>
  <div class="menu-card">
    <div class="menu-head" onclick="setGuestName()" style="cursor:pointer">
      <div class="menu-ava" id="menuAva"></div>
      <div class="menu-name">زائر</div>
    </div>
    <div class="menu-list">
      <button class="menu-item" onclick="closeStoreMenu();visitorRegister()">
        <span class="mlabel">سجّل بياناتك / حسابي</span>
        <span class="micon" style="background:#E5EDFF;color:#1D4ED8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="12" cy="8" r="3.4"/><path d="M5 20a7 7 0 0 1 14 0"/></svg></span>
      </button>
      <button class="menu-item" onclick="closeStoreMenu();enableNotifications()">
        <span class="mlabel">تفعيل الإشعارات</span>
        <span class="micon" style="background:#FEF3C7;color:#B45309"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg></span>
      </button>
      <button class="menu-item" onclick="closeStoreMenu();openCart()">
        <span class="mlabel" data-i18n="mOrders">طلباتي</span>
        <span class="micon" style="background:#FEF3E2;color:#C2710C">${''}<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><circle cx="9" cy="20" r="1.6"/><circle cx="17" cy="20" r="1.6"/><path d="M2 3h3l2.5 12.5a1.6 1.6 0 0 0 1.6 1.3h8.3a1.6 1.6 0 0 0 1.6-1.2L22 7H6"/></svg></span>
      </button>
      <button class="menu-item" onclick="closeStoreMenu();openFavorites()">
        <span class="mlabel" data-i18n="favorites">المفضّلة</span>
        <span class="micon" style="background:#FCE7EE;color:#E11D48"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M12 21s-7-4.5-9.5-8.5A5.2 5.2 0 0 1 12 6a5.2 5.2 0 0 1 9.5 6.5C19 16.5 12 21 12 21z"/></svg></span>
      </button>
      <button class="menu-item" onclick="toggleDark()">
        <span class="mlabel" data-i18n="darkMode">الوضع الليلي</span>
        <span class="micon" id="darkIcon" style="background:#E5EDFF;color:#1D4ED8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></span>
      </button>
      <button class="menu-item" onclick="closeStoreMenu();showAbout()">
        <span class="mlabel" data-i18n="mAbout">معلومات عنا</span>
        <span class="micon" style="background:#E5EDFF;color:#1D4ED8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="18" height="18"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg></span>
      </button>
      <button class="menu-item" onclick="closeStoreMenu();showTerms()">
        <span class="mlabel" data-i18n="mTerms">الشروط والاستخدام</span>
        <span class="micon" style="background:#FBE9E9;color:#DC2626"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M6 2h9l5 5v15H6z"/><path d="M9 8h4M9 12h7M9 16h7"/></svg></span>
      </button>
      <button class="menu-item" onclick="closeStoreMenu();openWhatsApp()">
        <span class="mlabel" data-i18n="mSupport">فريق الدعم</span>
        <span class="micon" style="background:#E7F7EE;color:#25D366"><svg viewBox="0 0 24 24" fill="#25D366" width="18" height="18"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.8 4.9-1.3A10 10 0 1 0 12 2zm0 18.2c-1.6 0-3-.4-4.3-1.2l-.3-.2-2.9.8.8-2.8-.2-.3A8.2 8.2 0 1 1 12 20.2z"/></svg></span>
      </button>
      <button class="menu-item" onclick="closeStoreMenu();adminLogin()">
        <span class="mlabel" data-i18n="mAdmin">دخول كمدير</span>
        <span class="micon" style="background:#E5EDFF;color:#1D4ED8"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg></span>
      </button>
    </div>

function notifSupported(){return !!(MSG&&('serviceWorker' in navigator)&&('Notification' in window));}
function enableNotifications(){
  if(!notifSupported()){toast('متصفّحك لا يدعم الإشعارات. على آيفون أضف الموقع إلى الشاشة الرئيسية أولاً.','err');return;}
  if(!VAPID_KEY){toast('لم تُضبط الإشعارات بعد (مفتاح Web Push)','err');return;}
  if(Notification.permission==='denied'){toast('الإشعارات محظورة من إعدادات المتصفّح — فعّلها يدوياً','err');return;}
  Notification.requestPermission().then(perm=>{
    if(perm!=='granted'){toast('لم تُمنح صلاحية الإشعارات','err');return;}
    navigator.serviceWorker.register('firebase-messaging-sw.js').then(reg=>{
      MSG.getToken({vapidKey:VAPID_KEY,serviceWorkerRegistration:reg}).then(token=>{
        if(!token){toast('تعذّر إنشاء رمز الإشعار','err');return;}
        if(FS){const v=getVisitor()||{};FS.collection('pushtokens').doc(token).set({token,name:(v&&v.name)||'',phone:(v&&v.phone)||'',date:new Date().toISOString()}).catch(()=>{});}
        try{localStorage.setItem('sadaqa_push','1');}catch(e){}
        toast('تم تفعيل الإشعارات ✔','ok');
      }).catch(e=>{toast('تعذّر التفعيل','err');console.warn(e);});
    }).catch(()=>toast('تعذّر تسجيل خدمة الإشعارات','err'));
  });
}
function showInAppNotif(title,body){
  let el=document.getElementById('inAppNotif');if(el)el.remove();
  el=document.createElement('div');el.id='inAppNotif';el.className='inapp-notif';
  el.innerHTML=`<div class="ic"><svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0"/></svg></div>
    <div style="flex:1;min-width:0"><div class="ttl">${esc(title||'إشعار جديد')}</div>${body?`<div class="bd">${esc(body)}</div>`:''}</div>
    <button class="cls" onclick="event.stopPropagation();var e=document.getElementById('inAppNotif');if(e){e.classList.remove('show');setTimeout(function(){e.remove();},350);}">×</button>`;
  el.onclick=()=>{el.remove();try{openNotifications();}catch(e){}};
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{const e=document.getElementById('inAppNotif');if(e){e.classList.remove('show');setTimeout(()=>e.remove(),400);}},7000);
}

function cloudInit(){
  if(!FS)return;
  setSync('sync');
  /* المنتجات: كل منتج وثيقة مستقلة */
  FS.collection('products').onSnapshot(snap=>{
    if(snap.empty&&_firstProdSync&&DB.products&&DB.products.length){
      /* أول مرة والسحابة فارغة: ارفع المنتجات المحلية */
      DB.products.forEach(p=>{if(p&&p.id)FS.collection('products').doc(String(p.id)).set(p).catch(()=>{});});
    }else if(!snap.empty){
      _applyingRemote=true;
      DB.products=snap.docs.map(d=>d.data());
      save();
      _applyingRemote=false;
      refreshViews();
    }
    _firstProdSync=false;
    setSync('ok');
  }, e=>{setSync('err');console.warn('snap products',e);});
  /* البيانات العامة: الأقسام + الوحدات + إعدادات المتجر */
  FS.collection('meta').doc('catalog').onSnapshot(snap=>{
    if(!snap.exists){ if(_firstMetaSync)cloudPutMeta(); }
    else{
      const c=snap.data()||{};
      if(c._ts&&c._ts===_metaTs){_firstMetaSync=false;return;}
      _applyingRemote=true;
      if(Array.isArray(c.categories))DB.categories=c.categories;
      if(c.catUnits&&typeof c.catUnits==='object')DB.catUnits=c.catUnits;
      if(Array.isArray(c.warehouses)&&c.warehouses.length)DB.warehouses=c.warehouses;
      if(Array.isArray(c.services))DB.services=c.services;
      if(c.settings&&typeof c.settings==='object')Object.assign(DB.settings,c.settings);
      save();
      _applyingRemote=false;
      refreshViews();
    }
    _firstMetaSync=false;
    setSync('ok');
  }, e=>{setSync('err');console.warn('snap meta',e);});
  /* الإشعارات/العروض: تحديث حيّ */
  try{
    FS.collection('announcements').onSnapshot(snap=>{
      const list=snap.docs.map(d=>d.data()).filter(a=>a&&a.active!==false);
      list.sort((a,b)=>new Date(b.date)-new Date(a.date));
      window._ann=list;
      if(typeof updateNotifBadge==='function')updateNotifBadge();
      const newest=list[0];
      if(newest&&window._annInit){const seen=Number(localStorage.getItem('sadaqa_seen_notif')||0);
        if(new Date(newest.date).getTime()>seen){try{showInAppNotif(newest.title||'عرض جديد',newest.body||'');}catch(e){}}}
      window._annInit=true;
    }, e=>{});
  }catch(e){}
}

function startOf(period){

  if(period==='day')return d;

function _toastFade(el){el.style.opacity='0';el.style.transition='.3s';setTimeout(()=>el.remove(),300);}
function toast(msg,type){
  const box=document.getElementById('toasts');
  const cur=box.lastElementChild;
  // نفس الرسالة ظاهرة؟ أعد ضبط المؤقّت فقط (لا تكرار)
  if(cur&&cur.dataset.msg===msg&&cur.dataset.type===(type||'')){
    clearTimeout(cur._timer);cur._timer=setTimeout(()=>_toastFade(cur),2400);return;
  }
  // واحد يكفي: أزل أي تنبيهات سابقة
  Array.from(box.children).forEach(c=>{clearTimeout(c._timer);c.remove();});
  const t=document.createElement('div');t.className='toast '+(type||'');
  t.dataset.msg=msg;t.dataset.type=type||'';
  t.innerHTML=(type==='ok'?svg(I.check,17):type==='err'?svg(I.alert,17):'')+`<span>${msg}</span>`;
  box.appendChild(t);
  t._timer=setTimeout(()=>_toastFade(t),2400);
}

function defWh(){return (DB.warehouses&&DB.warehouses[0]&&DB.warehouses[0].id)||'wh_main';}

function ensureStock(p){if(!p.stock||typeof p.stock!=='object')p.stock={};if(!Object.keys(p.stock).length)p.stock[defWh()]=Number(p.qty)||0;}
function stockSum(p){ensureStock(p);return Object.values(p.stock).reduce((a,b)=>a+(Number(b)||0),0);}
function reconcileStock(p){ensureStock(p);const diff=(Number(p.qty)||0)-stockSum(p);if(diff!==0){const d=defWh();p.stock[d]=Math.max(0,(Number(p.stock[d])||0)+diff);}}
function reconcileAll(){let ch=false;DB.products.forEach(p=>{const before=JSON.stringify(p.stock);reconcileStock(p);if(JSON.stringify(p.stock)!==before)ch=true;});if(ch)save();}
function whTotalQty(wid){return DB.products.reduce((a,p)=>{ensureStock(p);return a+(Number(p.stock[wid])||0);},0);}

function productHistory(id){
  const p=DB.products.find(x=>x.id===id);if(!p){toast('المادة غير موجودة','err');return;}
  const match=it=>(it.id&&it.id===p.id)||(it.code&&p.code&&it.code===p.code)||(it.name===p.name);
  const moves=[];
  (DB.sales||[]).forEach(s=>{(s.items||[]).forEach(it=>{if(it.service)return;if(match(it))
    moves.push({date:s.date,kind:'sale',type:s.type,party:s.customerName||'عميل نقدي',qty:Number(it.qty)||0,price:Number(it.price)||0,total:it.total!=null?it.total:(it.price*it.qty),no:s.no,id:s.id});});});
  (DB.purchases||[]).forEach(pu=>{(pu.items||[]).forEach(it=>{if(match(it))
    moves.push({date:pu.date,kind:'pur',type:pu.type,party:pu.supplierName||'مورد',qty:Number(it.qty)||0,price:Number(it.cost)||0,total:it.total!=null?it.total:(it.cost*it.qty),no:pu.no,id:pu.id});});});
  moves.sort((a,b)=>new Date(b.date)-new Date(a.date));

        <div class="muted" style="font-size:12px">سعر البيع: ${money(p.price)} · الجملة: ${money(p.wholesale)} · المخزون الحالي: <b>${money(p.qty)}</b> ${esc(p.unit||'')}</div></div>
      </div>
    </div>

      <div class="card stat"><span class="label">إجمالي المُباع</span><div class="val t-num" style="color:var(--success)">${money(sold)}</div></div>

function genProductCode(){let max=100000;DB.products.forEach(p=>{const n=parseInt(p.code,10);if(!isNaN(n)&&n>max)max=n;});return String(max+1);}
const AR2LAT={'ا':'a','أ':'a','إ':'i','آ':'a','ب':'b','ت':'t','ث':'th','ج':'j','ح':'h','خ':'kh','د':'d','ذ':'dh','ر':'r','ز':'z','س':'s','ش':'ch','ص':'s','ض':'d','ط':'t','ظ':'z','ع':'a','غ':'gh','ف':'f','ق':'q','ك':'k','ل':'l','م':'m','ن':'n','ه':'h','و':'ou','ي':'y','ى':'a','ة':'a','ء':'','ئ':'y','ؤ':'ou','٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9'};
function arToLatin(s){
  if(!s)return '';let out='';
  for(const ch of s){ if(AR2LAT[ch]!=null)out+=AR2LAT[ch]; else if(/[A-Za-z0-9]/.test(ch))out+=ch; else if(ch===' '||ch==='-')out+=ch; else if('َُِّ ًٌٍْ'.indexOf(ch)>=0){} else out+=''; }
  out=out.replace(/\s+/g,' ').trim();
  return out.split(' ').map(w=>w?w.charAt(0).toUpperCase()+w.slice(1):w).join(' ');
}
function autoFr(){const fr=document.getElementById('f_namefr');if(!fr)return;if(fr.dataset.touched)return;fr.value=arToLatin(val('f_name'));}

function recalcUnits(){
  const names=catUnitNames(val('f_cat'));const n=names.length;
  for(let i=0;i<n-1;i++){
    const f=parseFloat(val('f_fac'+(i+1)))||0;

    const ce=document.getElementById('f_ucost'+(i+1)),se=document.getElementById('f_usell'+(i+1));
    if(f>0){ if(ce&&!isNaN(c))ce.value=+(c/f).toFixed(2); if(se&&!isNaN(s))se.value=+(s/f).toFixed(2); }
  }
  updateMargin();updateAfterDisc();
}
function updateMargin(){
  const el=document.getElementById('f_margin');if(!el)return;
  const {cost,sell}=smallestVals();
  if(sell<=0||cost<=0){el.style.display='none';return;}
  const profit=sell-cost,pct=cost>0?profit/cost*100:0,neg=profit<0;
  el.style.display='block';
  el.style.background=neg?'var(--danger-soft)':'var(--success-soft)';
  el.style.color=neg?'var(--danger)':'var(--success)';
  el.innerHTML=`هامش ربح الوحدة الصغرى: <span class="t-num">${money(profit)} ${CUR()}</span> · النسبة: <span class="t-num">${pct.toFixed(1)}%</span>`;

function updateAfterDisc(){

function invSave(){
  if(!cart.length){toast('الفاتورة فارغة','err');return;}
  const editing=editSaleId?DB.sales.find(s=>s.id===editSaleId):null;
  if(editing)reverseSale(editing); // إلغاء أثر الفاتورة القديمة قبل إعادة الاحتساب
  const net=invNet();const profit=invProfit();
  const paid=invEffPaid();
  const remaining=Math.max(0,net-paid);
  let cust=null;
  if(invType==='credit'){
    cust=DB.customers.find(c=>c.id===saleCustomer);
    if(!cust){toast('البيع الآجل يتطلب اختيار عميل','err');if(editing)reapplySale(editing);return;}
  }
  const balBefore=cust?(cust.balance||0):0;
  // خصم كل بند من مخزنه الخاص (الخدمات لا تُخصم)
  const _aff=[];
  cart.forEach(l=>{if(l.service)return;const p=DB.products.find(x=>x.id===l.id);if(p){const w=l.wh||saleWh;ensureStock(p);p.stock[w]=Math.max(0,(Number(p.stock[w])||0)-l.qty);p.qty=stockSum(p);if(!_aff.includes(p))_aff.push(p);}});
  const no=editing?editing.no:DB.seq.sale++;
  const whset=[...new Set(cart.filter(l=>!l.service).map(l=>l.wh||saleWh))];
  const invWhName=whset.length>1?'متعدّد المخازن':whName(whset[0]||saleWh);
  const payments=invType==='credit'?invPayments.slice():[{amount:Math.min(paid,net),date:todayISO(),note:'نقدي'}];
  const sale={id:editing?editing.id:uid('inv'),no,type:invType,date:editing?editing.date:((val('invDate')||todayISO())+'T'+new Date().toISOString().slice(11)),
    customerId:cust?cust.id:'',customerName:cust?cust.name:'عميل نقدي',warehouseId:saleWh,warehouseName:invWhName,
    boxId:saleBox,boxName:boxName(saleBox),
    items:cart.map(l=>{const c=lineCalc(l);return{id:l.id,name:l.name,code:l.code,unit:l.unit,price:l.price,qty:l.qty,disc:l.disc||0,total:c.total,service:!!l.service,note:l.note||'',wh:l.service?'':(l.wh||saleWh),warehouseName:l.service?'':whName(l.wh||saleWh)};}),
    subtotal:cart.reduce((a,l)=>a+lineCalc(l).gross,0),discount:cart.reduce((a,l)=>a+lineCalc(l).disc,0),
    total:net,paid:paid,remaining,profit,payments,balanceBefore:balBefore,balanceAfter:balBefore+(net-paid)};
  if(editing){sale.editedBy=(typeof CUR_USER!=='undefined'&&CUR_USER&&CUR_USER.name)?CUR_USER.name:'مستخدم';sale.editedAt=new Date().toISOString();const ix=DB.sales.findIndex(s=>s.id===editing.id);DB.sales[ix]=sale;}
  else DB.sales.push(sale);
  if(cust)cust.balance=balBefore+(net-paid);
  if(paid>0)addCash('in',paid,(editing?'تعديل فاتورة #':(invType==='cash'?'بيع نقدي #':'دفعة فاتورة آجلة #'))+no,sale.id,saleBox);
  save();_aff.forEach(p=>cloudPutProduct(p));
  editSaleId='';cart=[];saleCustomer='';_pickedId='';invPayments=[];invMin=false;
  toast(editing?('تم تعديل الفاتورة #'+no):('تم حفظ الفاتورة #'+no),'ok');
  showInvoice(sale);
  render();
}

  ctx.textAlign='left';ctx.fillText('الإجمالي',pad,y);y+=8;

    ctx.textAlign='left';ctx.fillText(money(i.total!=null?i.total:i.price*i.qty),pad,y);y+=rowH;});
  y+=4;ctx.strokeStyle='#cbd5e1';ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();y+=24;
  ctx.textAlign='right';ctx.font='bold 15px sans-serif';ctx.fillStyle='#0f172a';
  ctx.fillText(`الصافي: ${money(sale.total)} ${CUR()}`,RX,y);y+=22;

  if(sale.remaining>0){ctx.fillStyle='#dc2626';ctx.fillText(`المتبقّي: ${money(sale.remaining)} ${CUR()}`,RX,y);}
  return cv;

function saveVoucher(kind){
  const ptype=val('vc_ptype');const amt=parseFloat(val('vc_amt'))||0;
  if(amt<=0){toast('أدخل مبلغاً صحيحاً','err');return false;}
  const box=val('vc_box');const date=val('vc_date')||todayISO();const note=(val('vc_note')||'').trim();
  let partyId='',partyName='';
  if(ptype==='other'){partyName=(val('vc_party')||'').trim()||'حساب آخر';}
  else{partyId=val('vc_party')||'';if(!partyId){toast('اختر الطرف','err');return false;}}
  const no=DB.seq.voucher++;
  const vch={id:uid('vch'),no,kind,partyType:ptype,partyId,partyName,amount:amt,box,date:date+'T'+new Date().toISOString().slice(11),note};
  DB.vouchers.push(vch);
  // أثر الصندوق
  addCash(kind==='receipt'?'in':'out',amt,(kind==='receipt'?'سند قبض #':'سند دفع #')+no+(note?(' — '+note):''),vch.id,box);
  // أثر حساب الطرف
  if(ptype==='customer'){const c=DB.customers.find(x=>x.id===partyId);if(c){
    c.balance=(c.balance||0)+(kind==='receipt'?-amt:amt);
    DB.custPays.push({id:uid('cp'),custId:c.id,amount:(kind==='receipt'?amt:-amt),date,note:note||(kind==='receipt'?'سند قبض':'سند دفع'),box,voucher:vch.id});
  }}
  else if(ptype==='supplier'){const s=DB.suppliers.find(x=>x.id===partyId);if(s){
    s.balance=(s.balance||0)+(kind==='receipt'?amt:-amt);
  }}
  save();toast(kind==='receipt'?'تم تسجيل سند القبض':'تم تسجيل سند الدفع','ok');
  voucherPrint(vch.id);render();return true;
}
function delVoucher(id){
  const v=DB.vouchers.find(x=>x.id===id);if(!v)return;
  confirmDlg('حذف السند #'+v.no+'؟','سيُعكس أثره على الصندوق وحساب الطرف.',()=>{
    // عكس الصندوق
    addCash(v.kind==='receipt'?'out':'in',v.amount,'إلغاء سند #'+v.no,v.id,v.box);
    if(v.partyType==='customer'){const c=DB.customers.find(x=>x.id===v.partyId);if(c)c.balance=(c.balance||0)+(v.kind==='receipt'?v.amount:-v.amount);
      DB.custPays=DB.custPays.filter(p=>p.voucher!==v.id);}
    else if(v.partyType==='supplier'){const s=DB.suppliers.find(x=>x.id===v.partyId);if(s)s.balance=(s.balance||0)+(v.kind==='receipt'?-v.amount:v.amount);}
    DB.vouchers=DB.vouchers.filter(x=>x.id!==id);
    save();toast('تم حذف السند','ok');render();
  });
}

function cashCollect(boxId){
  const bal=boxBalance(boxId);
  modal({title:'تحصيل ليلي — '+boxName(boxId),body:`
    <p class="muted" style="font-size:13px;margin-bottom:12px">الرصيد الحالي: <b style="color:var(--primary-d)">${m(bal)}</b>. اكتب المبلغ الذي تتركه في الصندوق (الباقي)، ويُسحب الباقي كمبلغ محصّل.</p>
    <div class="field"><label>المبلغ المتروك (الباقي من الكاش)</label><input class="inp" id="cc_left" type="number" step="any" value="0" oninput="ccCalc(${bal})"></div>
    <div class="field" style="margin-top:12px"><label>المبلغ المُحصّل</label><input class="inp" id="cc_take" type="number" step="any" value="${bal}" disabled></div>
    <div class="field" style="margin-top:12px"><label>ملاحظة (اسم المستلِم مثلاً)</label><input class="inp" id="cc_note" placeholder="تحصيل ليلي"></div>`,
    actions:[{label:'تحصيل',primary:true,fn:()=>{
      const left=parseFloat(val('cc_left'))||0;const take=bal-left;
      if(take<=0){toast('لا يوجد مبلغ للتحصيل','err');return false;}
      addCash('out',take,(val('cc_note').trim()||'تحصيل ليلي')+' (تبقّى '+money(left)+')','',boxId);
      save();toast('تم تحصيل '+money(take),'ok');render();
    }},{label:'إلغاء',fn:()=>true}]});
}

/* ---------- سلة المحذوفات + دليل الهاتف ---------- */
function whIdByName(name){const w=(DB.warehouses||[]).find(x=>x.name===name);return w?w.id:null;}
function findProd(it){return (it.id&&DB.products.find(p=>p.id===it.id))||(it.code&&DB.products.find(p=>p.code===it.code))||DB.products.find(p=>p.name===it.name)||null;}
function lineWh(it,doc){return it.wh||whIdByName(it.warehouseName)||doc.warehouseId||defWh();}
function reverseSale(s){
  (s.items||[]).forEach(it=>{if(it.service)return;const p=findProd(it);if(p){const w=lineWh(it,s);ensureStock(p);p.stock[w]=(Number(p.stock[w])||0)+(Number(it.qty)||0);p.qty=stockSum(p);cloudPutProduct(p);}});
  if(s.customerId){const c=DB.customers.find(x=>x.id===s.customerId);if(c)c.balance=(c.balance||0)-((s.total||0)-(s.paid||0));}
  DB.cash=DB.cash.filter(m=>m.ref!==s.id);
}
function reapplySale(s){
  (s.items||[]).forEach(it=>{if(it.service)return;const p=findProd(it);if(p){const w=lineWh(it,s);ensureStock(p);p.stock[w]=Math.max(0,(Number(p.stock[w])||0)-(Number(it.qty)||0));p.qty=stockSum(p);cloudPutProduct(p);}});
  if(s.customerId){const c=DB.customers.find(x=>x.id===s.customerId);if(c)c.balance=(c.balance||0)+((s.total||0)-(s.paid||0));}
  if(s.paid>0)addCash('in',s.paid,'استرجاع فاتورة #'+s.no,s.id,s.boxId);
}
function reversePurchase(p0){
  (p0.items||[]).forEach(it=>{const p=findProd(it);if(p){const w=lineWh(it,p0);ensureStock(p);p.stock[w]=Math.max(0,(Number(p.stock[w])||0)-(Number(it.qty)||0));p.qty=stockSum(p);cloudPutProduct(p);}});
  if(p0.supplierId){const s=DB.suppliers.find(x=>x.id===p0.supplierId);if(s)s.balance=(s.balance||0)-((p0.total||0)-(p0.paid||0));}
  DB.cash=DB.cash.filter(m=>m.ref!==p0.id);
}
function reapplyPurchase(p0){
  (p0.items||[]).forEach(it=>{const p=findProd(it);if(p){const w=lineWh(it,p0);ensureStock(p);p.stock[w]=(Number(p.stock[w])||0)+(Number(it.qty)||0);p.qty=stockSum(p);cloudPutProduct(p);}});
  if(p0.supplierId){const s=DB.suppliers.find(x=>x.id===p0.supplierId);if(s)s.balance=(s.balance||0)+((p0.total||0)-(p0.paid||0));}
  if(p0.paid>0)addCash('out',p0.paid,'استرجاع شراء #'+p0.no,p0.id,p0.boxId);
}
function deleteSale(id){
  const i=DB.sales.findIndex(s=>s.id===id);if(i<0){toast('الفاتورة غير موجودة','err');return;}
  const s=DB.sales[i];
  confirmDlg('حذف الفاتورة #'+s.no+'؟','ستنتقل إلى سلة المحذوفات ويمكنك استرجاعها لاحقاً. سيُعاد المخزون ويُعدَّل رصيد الزبون.',()=>{
    reverseSale(s);DB.sales.splice(i,1);
    DB.trash.push({tid:uid('tr'),kind:'sale',deletedAt:new Date().toISOString(),data:s});
    save();closeModal();toast('نُقلت إلى سلة المحذوفات','ok');render();
  });
}
function deletePurchase(id){
  const i=DB.purchases.findIndex(p=>p.id===id);if(i<0){toast('غير موجودة','err');return;}
  const p0=DB.purchases[i];

function restoreTrash(tid){

}

let _regsCache=null;
function vRegs(v){
  v.innerHTML=`<div class="panel"><div class="panel-h">${svg(I.phone,18)}<h3>تسجيلات الزبائن من المتجر</h3>
